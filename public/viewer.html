<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作品ビューア — OreOre-Bench</title>
    <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%230071e3'/><text x='16' y='22' text-anchor='middle' font-family='sans-serif' font-size='18' font-weight='600' fill='white'>O</text></svg>">
    <link rel="stylesheet" href="/assets/apple-modern.css">
    <style>
        body {
            min-height: 100dvh;
            overflow: hidden;
            background: var(--bg-alt);
        }
        .viewer-shell {
            display: grid;
            grid-template-columns: minmax(280px, 340px) minmax(0, 1fr);
            height: 100dvh;
        }
        .sidebar {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            min-width: 0;
            overflow: hidden;
            border-right: 1px solid var(--border-subtle);
            background: var(--bg-alt);
        }
        .sidebar-header {
            position: sticky;
            top: 0;
            z-index: 3;
            display: grid;
            gap: 18px;
            padding: 20px 22px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
            background: rgba(245, 245, 247, 0.78);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
        }
        .back-link {
            width: fit-content;
            color: var(--link);
            font-size: var(--text-caption);
            text-decoration: none;
        }
        .back-link:hover {
            text-decoration: underline;
            text-underline-offset: 3px;
        }
        .theme-field {
            display: grid;
            gap: 8px;
        }
        .field-label, .section-label {
            color: var(--text-secondary);
            font-size: var(--text-caption);
            font-weight: 600;
        }
        .theme-select {
            width: 100%;
            min-height: 44px;
            padding: 9px 36px 9px 14px;
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            background: var(--bg-light);
            color: var(--text);
            cursor: pointer;
            transition: border-color var(--duration-fast) var(--ease-apple);
        }
        .theme-select:hover { border-color: var(--border-strong); }
        .model-section {
            display: flex;
            min-height: 0;
            flex: 1;
            flex-direction: column;
            padding: 22px;
            border-bottom: 1px solid var(--border-subtle);
        }
        .model-list {
            display: grid;
            gap: 8px;
            margin-top: 12px;
            padding-right: 4px;
            overflow-y: auto;
            overscroll-behavior-block: contain;
        }
        .model-button {
            width: 100%;
            padding: 13px 14px;
            border: 1px solid var(--border-subtle);
            border-left: 3px solid transparent;
            border-radius: 14px;
            background: var(--bg-light);
            color: var(--text);
            text-align: left;
            cursor: pointer;
            box-shadow: var(--shadow-card);
            transition:
                border-color var(--duration-fast) var(--ease-apple),
                box-shadow var(--duration-fast) var(--ease-apple),
                transform var(--duration-fast) var(--ease-apple);
        }
        .model-button:hover {
            border-color: var(--border-strong);
            box-shadow: var(--shadow-card-hover);
            transform: translateY(-1px);
        }
        .model-button.is-selected {
            border-left-color: var(--active-color, var(--cta));
            background: var(--bg-light);
            box-shadow: 0 0 0 1px rgba(0, 102, 204, 0.16);
        }
        .model-line {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 8px;
        }
        .model-name {
            min-width: 0;
            font-size: 0.9375rem;
            font-weight: 600;
            line-height: 1.35;
            overflow-wrap: anywhere;
        }
        .runner {
            color: var(--text-secondary);
            font-size: var(--text-caption);
            line-height: 1.45;
        }
        .cost-chip {
            display: inline-flex;
            flex: 0 0 auto;
            align-items: center;
            min-height: 24px;
            margin-top: 7px;
            padding: 3px 9px;
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-pill);
            background: var(--bg-alt);
            color: var(--text-secondary);
            font-size: var(--text-caption);
            line-height: 1;
            white-space: nowrap;
        }
        .entry-details {
            display: grid;
            gap: 10px;
            padding: 22px;
            background: var(--bg-light);
        }
        .detail-title {
            margin: 0;
            color: var(--text);
            font: 600 1.25rem / 1.3 var(--font-display);
            letter-spacing: -0.015em;
        }
        .entry-note {
            margin: 0;
            color: var(--text-secondary);
            font-size: var(--text-caption);
            line-height: 1.7;
        }
        .detail-links {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 6px 12px;
            margin-top: 4px;
        }
        .detail-link {
            display: inline-flex;
            align-items: center;
            min-height: 38px;
            padding: 8px 4px;
            color: var(--link);
            font-size: var(--text-caption);
            text-decoration: none;
        }
        .detail-link:hover {
            text-decoration: underline;
            text-underline-offset: 3px;
        }
        .detail-link.primary {
            padding-inline: 16px;
            border-radius: var(--radius-pill);
            background: var(--cta);
            color: #fff;
            font-weight: 600;
        }
        .detail-link.primary:hover {
            background: var(--cta-hover-aa);
            text-decoration: none;
        }
        .frame-wrap {
            min-width: 0;
            padding: 16px;
            overflow: hidden;
            background: #d2d2d7;
        }
        .artifact-frame {
            display: block;
            width: 100%;
            height: 100%;
            border: 0;
            border-radius: var(--radius-card);
            background: var(--bg-light);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.12);
        }
        @media (max-width: 767px) {
            body { overflow: auto; }
            .viewer-shell {
                grid-template-columns: minmax(0, 1fr);
                grid-template-rows: auto minmax(560px, 68dvh);
                height: auto;
                min-height: 100dvh;
            }
            .sidebar {
                overflow: visible;
                border-right: 0;
                border-bottom: 1px solid var(--border-subtle);
            }
            .sidebar-header {
                grid-template-columns: auto minmax(0, 1fr);
                align-items: end;
                padding: 14px 18px;
            }
            .theme-field { min-width: 0; }
            .model-section { padding: 16px 18px 18px; }
            .model-list {
                display: flex;
                margin-inline: -18px;
                padding-inline: 18px;
                padding-bottom: 4px;
                overflow-y: visible;
                overflow-x: auto;
                overscroll-behavior-inline: contain;
            }
            .model-button {
                flex: 0 0 clamp(248px, 78%, 286px);
                transform: none;
            }
            .entry-details { padding: 18px; }
            .frame-wrap { padding: 10px; }
            .artifact-frame { border-radius: 14px; }
        }
    </style>
</head>
<body>
    <main class="viewer-shell">
        <aside class="sidebar" aria-label="作品選択">
            <header class="sidebar-header">
                <a class="back-link" id="back-link" href="./index.html">‹ 一覧へ</a>
                <label class="theme-field">
                    <span class="field-label">テーマ</span>
                    <select class="theme-select" id="theme-select"></select>
                </label>
            </header>

            <section class="model-section" aria-labelledby="model-list-label">
                <div class="section-label" id="model-list-label">モデル</div>
                <div class="model-list" id="model-list"></div>
            </section>

            <section class="entry-details" aria-labelledby="detail-title">
                <h1 class="detail-title" id="detail-title"></h1>
                <p class="entry-note" id="entry-note"></p>
                <nav class="detail-links" aria-label="選択作品のリンク">
                    <a class="detail-link primary" id="open-link" target="_blank" rel="noopener noreferrer">新しいタブで開く</a>
                    <a class="detail-link" id="prompt-link" target="_blank" rel="noopener noreferrer">プロンプト</a>
                    <a class="detail-link" id="source-link" target="_blank" rel="noopener noreferrer">ソース</a>
                </nav>
            </section>
        </aside>

        <section class="frame-wrap" aria-label="作品プレビュー">
            <iframe
                class="artifact-frame"
                id="artifact-frame"
                title="選択した作品"
                sandbox="allow-scripts"
                referrerpolicy="no-referrer"
            ></iframe>
        </section>
    </main>

    <script src="./data.js"></script>
    <script>
        const themeKeys = Object.keys(THEMES);
        const params = new URLSearchParams(location.search);
        let runs = {};
        let activeTheme = Object.hasOwn(THEMES, params.get('theme')) ? params.get('theme') : themeKeys[0];
        let themeEntries = ENTRIES.filter(entry => entry.theme === activeTheme);
        let activeEntry = themeEntries.find(entry => entry.model === params.get('model')) || themeEntries[0];

        const themeSelect = document.getElementById('theme-select');
        const modelList = document.getElementById('model-list');
        const backLink = document.getElementById('back-link');
        const detailTitle = document.getElementById('detail-title');
        const entryNote = document.getElementById('entry-note');
        const openLink = document.getElementById('open-link');
        const promptLink = document.getElementById('prompt-link');
        const sourceLink = document.getElementById('source-link');
        const artifactFrame = document.getElementById('artifact-frame');

        function formatUsd(usd) {
            const digits = usd >= 1 ? 2 : usd >= 0.01 ? 3 : 4;
            return `$${usd.toFixed(digits)}`;
        }

        function formatRunCost(run) {
            if (!run || typeof run !== 'object' || !run.cost || typeof run.cost !== 'object') return null;
            const cost = run.cost;
            if (cost.actual_usd === 0) return { label: '$0', title: 'ローカル実行' };
            if (typeof cost.actual_usd === 'number') {
                return { label: formatUsd(cost.actual_usd), title: '実測コスト' };
            }
            if (typeof cost.usd !== 'number') return null;
            return {
                label: formatUsd(cost.usd),
                title: cost.estimated ? '推定・下限' : 'コスト'
            };
        }

        function artifactUrl(entry) {
            const filename = entry.kind === 'json' ? 'output.html' : 'index.html';
            return `./${entry.theme}/${entry.model}/${filename}`;
        }

        function syncUrl() {
            const nextParams = new URLSearchParams();
            nextParams.set('theme', activeTheme);
            nextParams.set('model', activeEntry.model);
            history.replaceState(null, '', `${location.pathname}?${nextParams}${location.hash}`);
        }

        function updateDetails() {
            const theme = THEMES[activeTheme];
            const model = MODELS[activeEntry.model];
            const url = artifactUrl(activeEntry);

            backLink.href = `./index.html?theme=${encodeURIComponent(activeTheme)}`;
            detailTitle.textContent = model.label;
            entryNote.textContent = activeEntry.note;
            openLink.href = url;
            promptLink.href = `./${activeTheme}/prompt.html`;
            sourceLink.href = `https://github.com/noricha-vr/oreore-bench/tree/main/public/${activeTheme}/${activeEntry.model}`;
            artifactFrame.title = `${theme.title} — ${model.label}`;
            artifactFrame.src = url;
            document.title = `${model.label} — ${theme.title} — OreOre-Bench`;
            requestAnimationFrame(() => artifactFrame.focus());
        }

        function handleListKeydown(event, index) {
            if (event.key !== 'ArrowUp' && event.key !== 'ArrowDown') return;
            event.preventDefault();
            const buttons = [...modelList.querySelectorAll('.model-button')];
            const offset = event.key === 'ArrowDown' ? 1 : -1;
            const nextIndex = (index + offset + buttons.length) % buttons.length;
            buttons[nextIndex].focus();
        }

        function renderModelList() {
            modelList.replaceChildren();
            themeEntries.forEach((entry, index) => {
                const model = MODELS[entry.model];
                const runCost = formatRunCost(runs[`${entry.theme}/${entry.model}`]);
                const button = document.createElement('button');
                const line = document.createElement('span');
                const name = document.createElement('span');
                const runner = document.createElement('span');

                button.type = 'button';
                button.className = 'model-button' + (entry === activeEntry ? ' is-selected' : '');
                button.style.setProperty('--active-color', THEMES[activeTheme].color);
                button.setAttribute('aria-pressed', entry === activeEntry ? 'true' : 'false');
                button.setAttribute('aria-label', `${model.label}、${entry.runner}`);
                line.className = 'model-line';
                name.className = 'model-name';
                name.textContent = model.label;
                runner.className = 'runner';
                runner.textContent = entry.runner.toLowerCase();
                line.appendChild(name);

                if (runCost) {
                    const chip = document.createElement('span');
                    chip.className = 'cost-chip';
                    chip.textContent = runCost.label;
                    chip.title = runCost.title;
                    line.appendChild(chip);
                }

                button.append(line, runner);
                button.addEventListener('click', () => selectEntry(entry));
                button.addEventListener('keydown', event => handleListKeydown(event, index));
                modelList.appendChild(button);
            });
        }

        function selectEntry(entry) {
            activeEntry = entry;
            renderModelList();
            updateDetails();
            syncUrl();
        }

        function selectTheme(themeKey) {
            activeTheme = themeKey;
            themeEntries = ENTRIES.filter(entry => entry.theme === activeTheme);
            activeEntry = themeEntries[0];
            themeSelect.value = activeTheme;
            renderModelList();
            updateDetails();
            syncUrl();
        }

        function initialize() {
            themeKeys.forEach(themeKey => {
                const option = document.createElement('option');
                option.value = themeKey;
                option.textContent = THEMES[themeKey].title;
                themeSelect.appendChild(option);
            });
            themeSelect.value = activeTheme;
            themeSelect.addEventListener('change', () => selectTheme(themeSelect.value));
            renderModelList();
            updateDetails();
            syncUrl();

            fetch('./runs.json', { cache: 'no-cache' })
                .then(response => response.ok ? response.json() : Promise.reject(new Error(`HTTP ${response.status}`)))
                .then(data => {
                    if (!data || typeof data !== 'object' || Array.isArray(data)) return;
                    runs = data;
                    renderModelList();
                })
                .catch(() => {
                    runs = {};
                });
        }

        initialize();
    </script>
</body>
</html>
