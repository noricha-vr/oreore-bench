<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作品ビューア — OreOre-Bench</title>
    <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%232563eb'/><text x='16' y='22' text-anchor='middle' font-family='sans-serif' font-size='18' font-weight='700' fill='white'>O</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --bg-soft: #f7f8fa;
            --fg: #1a1a1a;
            --fg-soft: #5a5a5a;
            --muted-fg: #6b7280;
            --border: #e5e7eb;
            --border-strong: #d1d5db;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --primary-fg: #ffffff;
            --radius: 12px;
            --radius-sm: 6px;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
        }

        body {
            margin: 0;
            overflow: hidden;
            background: var(--bg-soft);
            color: var(--fg);
            font-family: 'Plus Jakarta Sans', 'Noto Sans JP', sans-serif;
            font-size: 0.95rem;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        button,
        select,
        a {
            font: inherit;
        }

        a {
            color: inherit;
        }

        .viewer-shell {
            display: grid;
            grid-template-columns: 280px minmax(0, 1fr);
            height: 100dvh;
            min-height: 0;
        }

        .sidebar {
            display: flex;
            min-width: 0;
            min-height: 0;
            flex-direction: column;
            border-right: 1px solid var(--border);
            background: var(--bg);
        }

        .sidebar-header {
            flex: 0 0 auto;
            padding: 18px 20px 20px;
            border-bottom: 1px solid var(--border);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            min-height: 36px;
            margin-bottom: 12px;
            color: var(--fg-soft);
            font-weight: 700;
            text-decoration: none;
        }

        .back-link:hover {
            color: var(--primary);
        }

        .theme-field {
            display: grid;
            gap: 6px;
        }

        .field-label,
        .section-label {
            color: var(--muted-fg);
            font-size: 0.8125rem;
            font-weight: 700;
            letter-spacing: 0.04em;
        }

        .theme-select {
            width: 100%;
            min-height: 42px;
            padding: 8px 34px 8px 11px;
            border: 1px solid var(--border-strong);
            border-radius: var(--radius-sm);
            background: var(--bg);
            color: var(--fg);
            font-weight: 600;
        }

        .theme-select:hover {
            border-color: #9ca3af;
        }

        .theme-select:focus-visible,
        .model-button:focus-visible,
        .detail-link:focus-visible,
        .back-link:focus-visible {
            outline: 3px solid rgba(37, 99, 235, 0.28);
            outline-offset: 2px;
        }

        .model-section {
            display: flex;
            min-height: 0;
            flex: 1 1 auto;
            flex-direction: column;
        }

        .section-label {
            padding: 14px 20px 6px;
        }

        .model-list {
            display: flex;
            min-height: 0;
            flex: 1 1 auto;
            flex-direction: column;
            gap: 6px;
            overflow-y: auto;
            padding: 6px 12px 16px;
        }

        .model-button {
            --active-color: var(--primary);
            display: grid;
            width: 100%;
            gap: 4px;
            padding: 10px 10px 10px 12px;
            border: 1px solid transparent;
            border-left: 4px solid transparent;
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
            background: transparent;
            color: var(--fg);
            text-align: left;
            cursor: pointer;
        }

        .model-button:hover {
            border-color: var(--border);
            border-left-color: var(--border-strong);
            background: var(--bg-soft);
        }

        .model-button.is-selected {
            border-color: var(--border);
            border-left-color: var(--active-color);
            background: var(--bg-soft);
            box-shadow: var(--shadow-sm);
        }

        .model-line {
            display: flex;
            min-width: 0;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .model-name {
            min-width: 0;
            overflow: hidden;
            font-size: 0.9rem;
            font-weight: 700;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .runner {
            overflow: hidden;
            color: var(--muted-fg);
            font-size: 0.8125rem;
            line-height: 1.4;
            text-overflow: ellipsis;
            text-transform: lowercase;
            white-space: nowrap;
        }

        .cost-chip {
            display: inline-flex;
            min-height: 22px;
            flex: 0 0 auto;
            align-items: center;
            padding: 2px 7px;
            border: 1px solid #e2e5e9;
            border-radius: 999px;
            background: #f1f3f5;
            color: #343a40;
            font-size: 0.8125rem;
            font-weight: 700;
            line-height: 1;
            white-space: nowrap;
        }

        .entry-details {
            flex: 0 0 auto;
            max-height: 34vh;
            overflow-y: auto;
            padding: 16px 20px 18px;
            border-top: 1px solid var(--border);
            background: #fbfcfd;
        }

        .detail-title {
            margin: 0 0 6px;
            font-size: 1rem;
            line-height: 1.4;
        }

        .entry-note {
            margin: 0 0 14px;
            color: var(--fg-soft);
            font-size: 0.875rem;
            line-height: 1.65;
        }

        .detail-links {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .detail-link {
            display: inline-flex;
            min-height: 34px;
            align-items: center;
            justify-content: center;
            padding: 6px 9px;
            border: 1px solid var(--border-strong);
            border-radius: var(--radius-sm);
            background: var(--bg);
            color: var(--fg);
            font-size: 0.8125rem;
            font-weight: 700;
            text-decoration: none;
        }

        .detail-link:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .detail-link.primary {
            border-color: var(--primary);
            background: var(--primary);
            color: var(--primary-fg);
        }

        .detail-link.primary:hover {
            border-color: var(--primary-hover);
            background: var(--primary-hover);
            color: var(--primary-fg);
        }

        .frame-wrap {
            min-width: 0;
            min-height: 0;
            background: #e9ecef;
        }

        .artifact-frame {
            display: block;
            width: 100%;
            height: 100%;
            border: 0;
            background: var(--bg);
        }

        @media (max-width: 767px) {
            html,
            body {
                height: auto;
                min-height: 100%;
            }

            body {
                overflow: auto;
            }

            .viewer-shell {
                display: flex;
                height: auto;
                min-height: 100dvh;
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                border-right: 0;
                border-bottom: 1px solid var(--border);
            }

            .sidebar-header {
                display: grid;
                grid-template-columns: auto minmax(0, 1fr);
                align-items: end;
                gap: 12px;
                padding: 10px 16px 12px;
            }

            .back-link {
                min-height: 42px;
                margin: 0;
                white-space: nowrap;
            }

            .section-label {
                padding: 10px 16px 4px;
            }

            .model-list {
                flex-direction: row;
                gap: 8px;
                overflow-x: auto;
                overflow-y: hidden;
                padding: 6px 16px 12px;
                scroll-snap-type: x proximity;
            }

            .model-button {
                min-width: 220px;
                max-width: 240px;
                flex: 0 0 auto;
                scroll-snap-align: start;
            }

            .entry-details {
                max-height: none;
                padding: 12px 16px 14px;
            }

            .detail-title {
                margin-bottom: 4px;
            }

            .entry-note {
                display: -webkit-box;
                margin-bottom: 10px;
                overflow: hidden;
                -webkit-box-orient: vertical;
                -webkit-line-clamp: 3;
            }

            .frame-wrap {
                width: 100%;
                height: 70vh;
                min-height: 420px;
            }
        }
    </style>
</head>
<body>
    <main class="viewer-shell">
        <aside class="sidebar" aria-label="作品選択">
            <header class="sidebar-header">
                <a class="back-link" id="back-link" href="./index.html">◀ 一覧へ</a>
                <label class="theme-field">
                    <span class="field-label">テーマ</span>
                    <select class="theme-select" id="theme-select"></select>
                </label>
            </header>

            <section class="model-section" aria-labelledby="model-list-label">
                <div class="section-label" id="model-list-label">モデル</div>
                <div class="model-list" id="model-list"></div>
            </section>

            <section class="entry-details" aria-labelledby="detail-title">
                <h1 class="detail-title" id="detail-title"></h1>
                <p class="entry-note" id="entry-note"></p>
                <nav class="detail-links" aria-label="選択作品のリンク">
                    <a class="detail-link primary" id="open-link" target="_blank" rel="noopener noreferrer">新しいタブで開く</a>
                    <a class="detail-link" id="prompt-link" target="_blank" rel="noopener noreferrer">プロンプト</a>
                    <a class="detail-link" id="source-link" target="_blank" rel="noopener noreferrer">ソース</a>
                </nav>
            </section>
        </aside>

        <section class="frame-wrap" aria-label="作品プレビュー">
            <iframe
                class="artifact-frame"
                id="artifact-frame"
                title="選択した作品"
                sandbox="allow-scripts"
                referrerpolicy="no-referrer"
            ></iframe>
        </section>
    </main>

    <script src="./data.js"></script>
    <script>
        const themeKeys = Object.keys(THEMES);
        const params = new URLSearchParams(location.search);
        let runs = {};
        let activeTheme = Object.hasOwn(THEMES, params.get('theme')) ? params.get('theme') : themeKeys[0];
        let themeEntries = ENTRIES.filter(entry => entry.theme === activeTheme);
        let activeEntry = themeEntries.find(entry => entry.model === params.get('model')) || themeEntries[0];

        const themeSelect = document.getElementById('theme-select');
        const modelList = document.getElementById('model-list');
        const backLink = document.getElementById('back-link');
        const detailTitle = document.getElementById('detail-title');
        const entryNote = document.getElementById('entry-note');
        const openLink = document.getElementById('open-link');
        const promptLink = document.getElementById('prompt-link');
        const sourceLink = document.getElementById('source-link');
        const artifactFrame = document.getElementById('artifact-frame');

        function formatUsd(usd) {
            const digits = usd >= 1 ? 2 : usd >= 0.01 ? 3 : 4;
            return `$${usd.toFixed(digits)}`;
        }

        function formatRunCost(run) {
            if (!run || typeof run !== 'object' || !run.cost || typeof run.cost !== 'object') return null;
            const cost = run.cost;
            if (cost.actual_usd === 0) return { label: '$0', title: 'ローカル実行' };
            if (typeof cost.actual_usd === 'number') {
                return { label: formatUsd(cost.actual_usd), title: '実測コスト' };
            }
            if (typeof cost.usd !== 'number') return null;
            return {
                label: formatUsd(cost.usd),
                title: cost.estimated ? '推定・下限' : 'コスト'
            };
        }

        function artifactUrl(entry) {
            const filename = entry.kind === 'json' ? 'output.html' : 'index.html';
            return `./${entry.theme}/${entry.model}/${filename}`;
        }

        function syncUrl() {
            const nextParams = new URLSearchParams();
            nextParams.set('theme', activeTheme);
            nextParams.set('model', activeEntry.model);
            history.replaceState(null, '', `${location.pathname}?${nextParams}${location.hash}`);
        }

        function updateDetails() {
            const theme = THEMES[activeTheme];
            const model = MODELS[activeEntry.model];
            const url = artifactUrl(activeEntry);

            backLink.href = `./index.html?theme=${encodeURIComponent(activeTheme)}`;
            detailTitle.textContent = model.label;
            entryNote.textContent = activeEntry.note;
            openLink.href = url;
            promptLink.href = `./${activeTheme}/prompt.html`;
            sourceLink.href = `https://github.com/noricha-vr/oreore-bench/tree/main/public/${activeTheme}/${activeEntry.model}`;
            artifactFrame.title = `${theme.title} — ${model.label}`;
            artifactFrame.src = url;
            document.title = `${model.label} — ${theme.title} — OreOre-Bench`;
            requestAnimationFrame(() => artifactFrame.focus());
        }

        function handleListKeydown(event, index) {
            if (event.key !== 'ArrowUp' && event.key !== 'ArrowDown') return;
            event.preventDefault();
            const buttons = [...modelList.querySelectorAll('.model-button')];
            const offset = event.key === 'ArrowDown' ? 1 : -1;
            const nextIndex = (index + offset + buttons.length) % buttons.length;
            buttons[nextIndex].focus();
        }

        function renderModelList() {
            modelList.replaceChildren();
            themeEntries.forEach((entry, index) => {
                const model = MODELS[entry.model];
                const runCost = formatRunCost(runs[`${entry.theme}/${entry.model}`]);
                const button = document.createElement('button');
                const line = document.createElement('span');
                const name = document.createElement('span');
                const runner = document.createElement('span');

                button.type = 'button';
                button.className = 'model-button' + (entry === activeEntry ? ' is-selected' : '');
                button.style.setProperty('--active-color', THEMES[activeTheme].color);
                button.setAttribute('aria-pressed', entry === activeEntry ? 'true' : 'false');
                button.setAttribute('aria-label', `${model.label}、${entry.runner}`);
                line.className = 'model-line';
                name.className = 'model-name';
                name.textContent = model.label;
                runner.className = 'runner';
                runner.textContent = entry.runner.toLowerCase();
                line.appendChild(name);

                if (runCost) {
                    const chip = document.createElement('span');
                    chip.className = 'cost-chip';
                    chip.textContent = runCost.label;
                    chip.title = runCost.title;
                    line.appendChild(chip);
                }

                button.append(line, runner);
                button.addEventListener('click', () => selectEntry(entry));
                button.addEventListener('keydown', event => handleListKeydown(event, index));
                modelList.appendChild(button);
            });
        }

        function selectEntry(entry) {
            activeEntry = entry;
            renderModelList();
            updateDetails();
            syncUrl();
        }

        function selectTheme(themeKey) {
            activeTheme = themeKey;
            themeEntries = ENTRIES.filter(entry => entry.theme === activeTheme);
            activeEntry = themeEntries[0];
            themeSelect.value = activeTheme;
            renderModelList();
            updateDetails();
            syncUrl();
        }

        function initialize() {
            themeKeys.forEach(themeKey => {
                const option = document.createElement('option');
                option.value = themeKey;
                option.textContent = THEMES[themeKey].title;
                themeSelect.appendChild(option);
            });
            themeSelect.value = activeTheme;
            themeSelect.addEventListener('change', () => selectTheme(themeSelect.value));
            renderModelList();
            updateDetails();
            syncUrl();

            fetch('./runs.json', { cache: 'no-cache' })
                .then(response => response.ok ? response.json() : Promise.reject(new Error(`HTTP ${response.status}`)))
                .then(data => {
                    if (!data || typeof data !== 'object' || Array.isArray(data)) return;
                    runs = data;
                    renderModelList();
                })
                .catch(() => {
                    runs = {};
                });
        }

        initialize();
    </script>
</body>
</html>
