<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>はさみ将棋</title>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      margin: 0;
      padding: 10px;
      background: #f4f4f4;
    }
    h1 { font-size: 1.5em; }
    #status { margin: 10px 0; font-weight: bold; }
    #board {
      display: inline-grid;
      grid-template-columns: repeat(9, 40px);
      grid-template-rows: repeat(9, 40px);
      gap: 1px;
      background: #888;
      border: 2px solid #333;
      margin: 10px auto;
    }
    .cell {
      width: 40px;
      height: 40px;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2em;
      cursor: pointer;
      box-sizing: border-box;
    }
    .cell.highlight {
      background: #cfc;
    }
    .cell.selected {
      background: #ffc;
    }
    #info { margin: 10px; }
    button { padding: 8px 16px; font-size: 1em; }
    @media (max-width: 500px) {
      #board { transform: scale(0.8); }
    }
  </style>
</head>
<body>
  <h1>はさみ将棋</h1>
  <div id="status">あなたの番です</div>
  <div id="info">
    <span>あなたの取り: <span id="player-captured">0</span>枚</span>
    <span>CPUの取り: <span id="cpu-captured">0</span>枚</span>
  </div>
  <div id="board"></div>
  <button onclick="resetGame()">リセット</button>

  <script>
    const SIZE = 9;
    let board = [];
    let selected = null;
    let playerCaptured = 0;
    let cpuCaptured = 0;
    let gameActive = true;
    let turn = 'player';

    const boardEl = document.getElementById('board');
    const statusEl = document.getElementById('status');
    const playerCapturedEl = document.getElementById('player-captured');
    const cpuCapturedEl = document.getElementById('cpu-captured');

    function initBoard() {
      board = Array(SIZE).fill().map(() => Array(SIZE).fill(null));
      for (let c = 0; c < SIZE; c++) {
        board[SIZE - 1][c] = 'player';
        board[0][c] = 'cpu';
      }
    }

    function renderBoard() {
      boardEl.innerHTML = '';
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          const cell = document.createElement('div');
          cell.classList.add('cell');
          cell.dataset.r = r;
          cell.dataset.c = c;
          if (board[r][c]) {
            cell.textContent = board[r][c] === 'player' ? '歩' : 'と';
          }
          if (selected && selected.r === r && selected.c === c) {
            cell.classList.add('selected');
          } else if (isHighlight(r, c)) {
            cell.classList.add('highlight');
          }
          cell.addEventListener('click', () => handleCellClick(r, c));
          boardEl.appendChild(cell);
        }
      }
      playerCapturedEl.textContent = playerCaptured;
      cpuCapturedEl.textContent = cpuCaptured;
    }

    function isHighlight(r, c) {
      if (!selected) return false;
      if (board[r][c]) return false;
      return canMoveTo(selected.r, selected.c, r, c);
    }

    function canMoveTo(fr, fc, tr, tc) {
      if (fr === tr && fc === tc) return false;
      if (board[tr][tc]) return false;
      if (fr === tr) {
        const step = fc < tc ? 1 : -1;
        for (let c = fc + step; c !== tc; c += step) {
          if (board[fr][c]) return false;
        }
        return true;
      }
      if (fc === tc) {
        const step = fr < tr ? 1 : -1;
        for (let r = fr + step; r !== tr; r += step) {
          if (board[r][fc]) return false;
        }
        return true;
      }
      return false;
    }

    function handleCellClick(r, c) {
      if (!gameActive || turn !== 'player') return;
      if (selected) {
        if (selected.r === r && selected.c === c) {
          selected = null;
          renderBoard();
          return;
        }
        if (board[r][c] === 'player') {
          selected = { r, c };
          renderBoard();
          return;
        }
        if (canMoveTo(selected.r, selected.c, r, c)) {
          movePiece(selected.r, selected.c, r, c, 'player');
          selected = null;
          checkGameOver();
          if (gameActive) {
            turn = 'cpu';
            statusEl.textContent = 'CPU思考中...';
            setTimeout(cpuMove, 300);
          }
        }
      } else {
        if (board[r][c] === 'player') {
          selected = { r, c };
          renderBoard();
        }
      }
    }

    function movePiece(fr, fc, tr, tc, owner) {
      board[tr][tc] = owner;
      board[fr][fc] = null;
      const captured = checkCaptures(tr, tc, owner);
      if (owner === 'player') {
        cpuCaptured += captured;
      } else {
        playerCaptured += captured;
      }
    }

    function checkCaptures(r, c, owner) {
      let count = 0;
      const dirs = [[0,1],[1,0],[0,-1],[-1,0]];
      for (const [dr, dc] of dirs) {
        let cr = r + dr, cc = c + dc;
        let chain = [];
        while (cr >= 0 && cr < SIZE && cc >= 0 && cc < SIZE) {
          const cell = board[cr][cc];
          if (cell === null) break;
          if (cell === owner) {
            if (chain.length > 0) {
              for (const [pr, pc] of chain) {
                board[pr][pc] = null;
                count++;
              }
            }
            break;
          } else {
            chain.push([cr, cc]);
          }
          cr += dr;
          cc += dc;
        }
      }
      // Corner capture
      const corners = [[0,0],[0,SIZE-1],[SIZE-1,0],[SIZE-1,SIZE-1]];
      for (const [cr, cc] of corners) {
        if (board[cr][cc] && board[cr][cc] !== owner) {
          const neighbors = getCornerNeighbors(cr, cc);
          let allOwned = true;
          for (const [nr, nc] of neighbors) {
            if (!board[nr][nc] || board[nr][nc] !== owner) {
              allOwned = false;
              break;
            }
          }
          if (allOwned) {
            board[cr][cc] = null;
            count++;
          }
        }
      }
      return count;
    }

    function getCornerNeighbors(r, c) {
      const neighbors = [];
      if (r === 0 && c === 0) neighbors.push([0,1],[1,0]);
      else if (r === 0 && c === SIZE-1) neighbors.push([0,SIZE-2],[1,SIZE-1]);
      else if (r === SIZE-1 && c === 0) neighbors.push([SIZE-2,0],[SIZE-1,1]);
      else if (r === SIZE-1 && c === SIZE-1) neighbors.push([SIZE-1,SIZE-2],[SIZE-2,SIZE-1]);
      return neighbors;
    }

    function checkGameOver() {
      if (playerCaptured >= 5) {
        statusEl.textContent = 'あなたの勝ち！';
        gameActive = false;
        return;
      }
      if (cpuCaptured >= 5) {
        statusEl.textContent = 'CPUの勝ち！';
        gameActive = false;
        return;
      }
      if (!hasLegalMove('player')) {
        statusEl.textContent = '合法手なし！CPUの勝ち！';
        gameActive = false;
      }
    }

    function hasLegalMove(owner) {
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          if (board[r][c] === owner) {
            for (let tr = 0; tr < SIZE; tr++) {
              for (let tc = 0; tc < SIZE; tc++) {
                if (canMoveTo(r, c, tr, tc)) return true;
              }
            }
          }
        }
      }
      return false;
    }

    function cpuMove() {
      const moves = [];
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          if (board[r][c] === 'cpu') {
            for (let tr = 0; tr < SIZE; tr++) {
              for (let tc = 0; tc < SIZE; tc++) {
                if (canMoveTo(r, c, tr, tc)) {
                  const tempBoard = board.map(row => [...row]);
                  const tempPlayer = playerCaptured;
                  const tempCpu = cpuCaptured;
                  board[tr][tc] = 'cpu';
                  board[r][c] = null;
                  const captured = checkCaptures(tr, tc, 'cpu');
                  cpuCaptured += captured;
                  moves.push({ fr: r, fc: c, tr, tc, captured });
                  board = tempBoard;
                  playerCaptured = tempPlayer;
                  cpuCaptured = tempCpu;
                }
              }
            }
          }
        }
      }
      if (moves.length === 0) {
        statusEl.textContent = '合法手なし！あなたの勝ち！';
        gameActive = false;
        return;
      }
      moves.sort((a, b) => {
        if (b.captured !== a.captured) return b.captured - a.captured;
        return 0;
      });
      const best = moves[0];
      movePiece(best.fr, best.fc, best.tr, best.tc, 'cpu');
      renderBoard();
      checkGameOver();
      if (gameActive) {
        turn = 'player';
        statusEl.textContent = 'あなたの番です';
      }
    }

    function resetGame() {
      initBoard();
      selected = null;
      playerCaptured = 0;
      cpuCaptured = 0;
      gameActive = true;
      turn = 'player';
      statusEl.textContent = 'あなたの番です';
      renderBoard();
    }

    initBoard();
    renderBoard();
  </script>
</body>
</html>
