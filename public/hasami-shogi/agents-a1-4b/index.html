<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hassami Shogi</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 1rem;
            box-sizing: border-box;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-width: 600px;
            width: 100%;
        }

        .ui-panel {
            display: flex;
            justify-content: space-between;
            background: white;
            padding: 1rem;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            align-items: center;
        }

        .score-box {
            font-weight: bold;
            display: flex;
            gap: 1rem;
        }

        .score-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .score-val {
            font-size: 1.2rem;
            color: #333;
        }

        .turn-indicator {
            font-weight: bold;
            color: #555;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            width: 100%;
            aspect-ratio: 9/9;
            background-color: #dcf5c7; /* Classic Shogi board color */
            border: 2px solid #4b3621;
            gap: 2px;
            border-radius: 4px;
            overflow: hidden;
        }

        .cell {
            background-color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            cursor: pointer;
            user-select: none;
            position: relative;
        }

        .cell.highlight {
            background-color: #e8f5e8;
        }

        .cell.selected {
            background-color: #b2ebf2;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.2);
        }

        .cell.valid-move {
            background-color: #e0f2f1;
        }

        .cell.valid-move::after {
            content: '';
            width: 4px;
            height: 4px;
            background-color: #0066cc;
            border-radius: 50%;
        }

        .cell.captured {
            opacity: 0.3;
        }

        /* Responsive adjustments */
        @media (max-width: 600px) {
            .board {
                aspect-ratio: auto;
                grid-template-columns: repeat(9, 1fr);
                width: 100%;
            }
            .cell {
                font-size: 1.2rem;
            }
        }

        button {
            padding: 0.5rem 1rem;
            background-color: #4caf50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }

        .game-over-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: bold;
            display: none;
        }

        .game-over-overlay.active {
            display: flex;
        }
    </style>
</head>

            </div>

    </div>

    <button id="reset-btn">リセット</button>
    
    <div class="game-over-overlay" id="game-over">
        <span id="winner-text"></span>
    </div>
</div>
