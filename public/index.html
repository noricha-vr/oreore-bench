<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>oreore-bench</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --fg: #1a1a1a;
            --fg-soft: #4a4a4a;
            --card: #fafafa;
            --card-hover: #f3f3f3;
            --primary: #1a1a1a;
            --primary-fg: #ffffff;
            --accent: #c0392b;
            --muted: #f5f5f5;
            --muted-fg: #888888;
            --border: #e8e8e8;
            --radius: 16px;
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg);
            color: var(--fg);
            font-family: 'Zen Kaku Gothic New', 'Noto Sans JP', sans-serif;
            font-weight: 500;
            line-height: 1.9;
            letter-spacing: 0.08em;
            margin: 0;
            padding: 120px 0;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 48px;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Zen Kaku Gothic New', 'Noto Sans JP', sans-serif;
            font-weight: 700;
            line-height: 1.4;
            letter-spacing: 0.08em;
            color: var(--fg);
        }

        a {
            color: var(--fg);
            text-decoration: underline;
            transition: color 0.3s ease;
        }

        a:hover {
            color: var(--accent);
        }

        .font-serif {
            font-family: 'Cormorant Garamond', 'Noto Serif JP', serif;
            letter-spacing: 0.05em;
        }
        
        .accent-text {
            color: var(--accent);
        }

        /* --- Header --- */
        .site-header {
            text-align: left;
            margin-bottom: 96px;
        }

        .site-header .title {
            font-size: 2rem;
            margin: 0 0 8px 0;
        }

        .site-header .tagline {
            font-size: 1rem;
            margin: 0 0 24px 0;
            color: var(--fg-soft);
            max-width: 60ch;
        }
        
        .site-header .stats {
            display: flex;
            gap: 24px;
            align-items: center;
            font-size: 0.875rem;
            color: var(--fg-soft);
        }

        .site-header .stats .stat-item span {
            font-size: 1.25rem;
        }

        .site-header .github-link {
            margin-left: auto;
            font-size: 0.875rem;
            text-decoration: none;
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: var(--radius);
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        .site-header .github-link:hover {
            background-color: var(--card);
            border-color: var(--card-hover);
            color: var(--fg);
        }

        /* --- Filters --- */
        .filters {
            margin-bottom: 32px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .filter-group {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px 24px;
        }
        
        .filter-group .label {
            font-size: 0.875rem;
            color: var(--muted-fg);
            width: 80px;
        }

        .filter-link {
            font-size: 1rem;
            font-weight: 500;
            color: var(--fg-soft);
            text-decoration: none;
            padding-bottom: 4px;
            border-bottom: 2px solid transparent;
            transition: color 0.3s ease, border-color 0.3s ease;
            cursor: pointer;
        }

        .filter-link:hover {
            color: var(--fg);
        }
        
        .filter-link.active {
            color: var(--fg);
            border-bottom-color: var(--accent);
        }

        /* --- Counter --- */
        .counter {
            margin-bottom: 96px;
            font-size: 1.125rem;
            color: var(--muted-fg);
        }

        .counter span {
            font-size: 1.5rem;
            font-weight: 700;
        }

        /* --- Entries Grid --- */
        .entries-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 120px 48px;
        }

        .entry-card {
            background-color: var(--card);
            border-radius: var(--radius);
            padding: 32px;
            transition: background-color 0.3s ease;
        }

        .entry-card:hover {
            background-color: var(--card-hover);
        }
        
        .entry-card .theme-title {
            font-size: 0.875rem;
            color: var(--muted-fg);
            margin: 0;
        }
        
        .entry-card .model-label {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 4px 0 16px 0;
        }
        
        .entry-card .note {
            font-size: 0.95rem;
            color: var(--fg-soft);
            margin: 0 0 32px 0;
            min-height: 5em;
        }
        
        .entry-card .links {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }
        
        .entry-card .card-link {
            display: inline-block;
            font-size: 0.875rem;
            font-weight: 700;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 99px; /* pill shape */
            transition: background-color 0.3s ease, color 0.3s ease;
            border: 1px solid transparent;
        }
        
        .entry-card .card-link.primary {
            background-color: var(--primary);
            color: var(--primary-fg);
        }

        .entry-card .card-link.primary:hover {
            background-color: var(--fg-soft);
            color: var(--primary-fg);
        }
        
        .entry-card .card-link.secondary {
            background-color: transparent;
            color: var(--fg-soft);
            border-color: var(--border);
        }

        .entry-card .card-link.secondary:hover {
            background-color: var(--bg);
            border-color: var(--fg-soft);
        }

        /* --- Footer --- */
        .site-footer {
            margin-top: 120px;
            padding-top: 48px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.875rem;
            color: var(--muted-fg);
        }
        
        /* --- Responsive --- */
        @media (max-width: 900px) {
            .entries-grid {
                grid-template-columns: 1fr;
                gap: 96px;
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 48px 0;
                letter-spacing: 0.06em;
            }
            .container {
                padding: 0 24px;
            }
            .site-header {
                margin-bottom: 64px;
            }
            .site-header .stats {
                flex-wrap: wrap;
            }
            .site-header .github-link {
                display: none;
            }
             .counter {
                margin-bottom: 64px;
            }
            .site-footer {
                flex-direction: column;
                gap: 16px;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="site-header" id="site-header">
            <!-- Header content will be generated by JS -->
        </header>

        <main>
            <section class="filters" id="filters-container">
                <!-- Filters will be generated by JS -->
            </section>
            
            <div class="counter font-serif" id="entries-counter">
                <!-- Counter will be generated by JS -->
            </div>

            <section class="entries-grid" id="entries-grid">
                <!-- Entry cards will be generated by JS -->
            </section>
        </main>

        <footer class="site-footer">
            <div class="copyright">&copy; 2024 oreore-bench</div>
            <a href="https://github.com/noricha-vr/oreore-bench/issues/new?template=add-model.md" target="_blank" rel="noopener noreferrer">Add a model</a>
        </footer>
    </div>

    <script>
        const THEMES = {
          "lp-nishibi": {
            title: "NISHIBI Landing Page",
            desc: "「西日で焼く日焼けサロン」というネタ前提を、寡黙でプレミアムな高級ブランド LP として真顔で表現できるか。コピー力 / 配色 / 情報設計 / 細部のジョーク密度を見る。"
          },
          "othello": {
            title: "Othello (Reversi)",
            desc: "HTML/CSS/JS 1 枚で動く 8x8 オセロ。盤面の状態管理、合法手判定、CPU AI のヒューリスティック、UI ハイライト、終局・パスの正しさ。"
          }
        };

        const ENTRIES = [
          {
            theme: "lp-nishibi",
            model: "gemma-4-31b",
            model_label: "Gemma 4 31B",
            provider: "Google (local via LM Studio)",
            runner: "gptme (non-interactive)",
            note: "ローカル LLM 単体での1ショット LP。418行/14KB。Cormorant Garamond + Noto Serif JP。"
          },
          {
            theme: "lp-nishibi",
            model: "claude-opus-4-8",
            model_label: "Claude Opus 4.8",
            provider: "Anthropic",
            runner: "Claude Code (Agent SDK / implementer)",
            note: "ローマ数字章番号、SVG 西日アーク、メタジョーク3つ、創設者名「中道 暁人」まで創出。1342行/40KB。"
          },
          {
            theme: "othello",
            model: "gemma-4-26b-a4b-qat",
            model_label: "Gemma 4 26B-A4B (QAT)",
            provider: "Google (local via LM Studio)",
            runner: "gptme (non-interactive)",
            note: "ライトテーマ。CPU AI はランダム黒に圧勝(53-10)。Reset が一度だけ不安定。"
          },
          {
            theme: "othello",
            model: "gemma-4-31b",
            model_label: "Gemma 4 31B",
            provider: "Google (local via LM Studio)",
            runner: "gptme (non-interactive)",
            note: "ダーク BG + 鮮緑盤 + 赤 Reset。CPU AI が強くランダム黒に勝利(34-30)。Reset 完璧。"
          }
        ];

        document.addEventListener('DOMContentLoaded', () => {
            let currentTheme = 'All';
            let currentModel = 'All';

            const themeList = ['All', ...Object.keys(THEMES)];
            const modelList = ['All', ...new Set(ENTRIES.map(e => e.model_label))];
            const totalEntries = ENTRIES.length;

            const headerContainer = document.getElementById('site-header');
            const filtersContainer = document.getElementById('filters-container');
            const counterContainer = document.getElementById('entries-counter');
            const gridContainer = document.getElementById('entries-grid');

            function renderHeader() {
                const themeCount = Object.keys(THEMES).length;
                const modelCount = new Set(ENTRIES.map(e => e.model)).size;
                const entryCount = ENTRIES.length;

                headerContainer.innerHTML = `
                    <h1 class="title font-serif">oreore-bench</h1>
                    <p class="tagline">「同じプロンプトを違うモデルに投げて、何が出てくるかを残す」ベンチマーク作品集。指標は tokens/sec でも MMLU でもなく、「これは仕事で使えるか」の一点。</p>
                    <div class="stats">
                        <div class="stat-item">Themes: <span class="font-serif accent-text">${themeCount}</span></div>
                        <div class="stat-item">Models: <span class="font-serif accent-text">${modelCount}</span></div>
                        <div class="stat-item">Entries: <span class="font-serif accent-text">${entryCount}</span></div>
                        <a href="https://github.com/noricha-vr/oreore-bench" class="github-link" target="_blank" rel="noopener noreferrer">GitHub</a>
                    </div>
                `;
            }

            function renderFilters() {
                const themeFiltersHTML = `
                    <div class="filter-group">
                        <span class="label">Theme</span>
                        ${themeList.map(theme => `
                            <a class="filter-link theme-filter ${theme === currentTheme ? 'active' : ''}" data-theme="${theme}">
                                ${THEMES[theme]?.title || 'All'}
                            </a>
                        `).join('')}
                    </div>`;

                const modelFiltersHTML = `
                    <div class="filter-group">
                        <span class="label">Model</span>
                        ${modelList.map(model => `
                            <a class="filter-link model-filter ${model === currentModel ? 'active' : ''}" data-model="${model}">
                                ${model}
                            </a>
                        `).join('')}
                    </div>`;

                filtersContainer.innerHTML = themeFiltersHTML + modelFiltersHTML;
                addFilterListeners();
            }

            function addFilterListeners() {
                document.querySelectorAll('.theme-filter').forEach(el => {
                    el.addEventListener('click', (e) => {
                        currentTheme = e.target.dataset.theme;
                        renderFilters();
                        renderEntries();
                    });
                });

                document.querySelectorAll('.model-filter').forEach(el => {
                    el.addEventListener('click', (e) => {
                        currentModel = e.target.dataset.model;
                        renderFilters();
                        renderEntries();
                    });
                });
            }

            function renderEntries() {
                const filteredEntries = ENTRIES.filter(entry => {
                    const themeMatch = currentTheme === 'All' || entry.theme === currentTheme;
                    const modelMatch = currentModel === 'All' || entry.model_label === currentModel;
                    return themeMatch && modelMatch;
                });

                counterContainer.innerHTML = `
                    Showing <span class="font-serif accent-text">${filteredEntries.length}</span> of ${totalEntries}
                `;

                if (filteredEntries.length === 0) {
                    gridContainer.innerHTML = '<p>No matching entries found.</p>';
                    return;
                }
                
                gridContainer.innerHTML = filteredEntries.map(entry => {
                    const viewUrl = `./${entry.theme}/${entry.model}/index.html`;
                    const promptUrl = `./${entry.theme}/PROMPT.md`;
                    const sourceUrl = `https://github.com/noricha-vr/oreore-bench/tree/main/public/${entry.theme}/${entry.model}`;
                    
                    return `
                        <div class="entry-card">
                            <h3 class="theme-title">${THEMES[entry.theme].title}</h3>
                            <h2 class="model-label">${entry.model_label}</h2>
                            <p class="note">${entry.note}</p>
                            <div class="links">
                                <a href="${viewUrl}" class="card-link primary" target="_blank" rel="noopener noreferrer">VIEW</a>
                                <a href="${promptUrl}" class="card-link secondary" target="_blank" rel="noopener noreferrer">PROMPT</a>
                                <a href="${sourceUrl}" class="card-link secondary" target="_blank" rel="noopener noreferrer">SOURCE</a>
                            </div>
                        </div>
                    `;
                }).join('');
            }
            
            function init() {
                renderHeader();
                renderFilters();
                renderEntries();
            }

            init();
        });
    </script>
</body>
</html>
