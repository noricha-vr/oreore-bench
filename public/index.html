<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>oreore-bench — 俺基準の LLM ベンチ</title>
<meta name="description" content="同じプロンプトを違うモデルに投げて、何が出てくるかを残すベンチマーク。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Noto+Serif+JP:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf8f3;
    --bg-soft: #f1ede4;
    --ink: #1a1814;
    --ink-soft: #4a443c;
    --muted: #8a8378;
    --line: #d8d2c4;
    --accent: #b85c38;
    --paper: #fefcf7;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: "Noto Serif JP", "Cormorant Garamond", serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  a { color: inherit; text-decoration: none; }
  .container { max-width: 1280px; margin: 0 auto; padding: 0 32px; }
  @media (max-width: 720px) { .container { padding: 0 20px; } }

  /* Header */
  header {
    padding: 56px 0 32px;
    border-bottom: 1px solid var(--line);
  }
  .brand {
    font-family: "Cormorant Garamond", serif;
    font-size: 32px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: lowercase;
  }
  .brand .accent { color: var(--accent); font-style: italic; }
  .tagline {
    margin-top: 14px;
    font-size: 15px;
    color: var(--ink-soft);
    max-width: 640px;
  }
  .meta-row {
    margin-top: 24px;
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    font-family: "JetBrains Mono", monospace;
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .meta-row a { border-bottom: 1px solid var(--line); padding-bottom: 2px; transition: border-color 0.2s; }
  .meta-row a:hover { border-color: var(--accent); color: var(--accent); }

  /* Filters */
  .filters {
    padding: 32px 0 24px;
    border-bottom: 1px solid var(--line);
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 32px;
  }
  @media (max-width: 720px) { .filters { grid-template-columns: 1fr; gap: 20px; } }
  .filter-group .label {
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 10px;
  }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    font-family: "JetBrains Mono", monospace;
    font-size: 12px;
    padding: 6px 14px;
    border: 1px solid var(--line);
    background: var(--paper);
    color: var(--ink-soft);
    cursor: pointer;
    transition: all 0.18s ease;
    user-select: none;
    border-radius: 2px;
  }
  .chip:hover { border-color: var(--ink-soft); color: var(--ink); }
  .chip.active {
    background: var(--ink);
    color: var(--bg);
    border-color: var(--ink);
  }
  .chip .count {
    display: inline-block;
    margin-left: 6px;
    opacity: 0.55;
    font-size: 10px;
  }

  /* Counter */
  .counter {
    padding: 20px 0;
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }

  /* Grid */
  .entries {
    padding-bottom: 80px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 24px;
  }
  .entry {
    background: var(--paper);
    border: 1px solid var(--line);
    padding: 28px 24px 22px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    transition: border-color 0.2s, transform 0.2s;
  }
  .entry:hover { border-color: var(--ink-soft); transform: translateY(-2px); }
  .entry .topline {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }
  .entry .theme { color: var(--accent); }
  .entry .title {
    font-family: "Cormorant Garamond", serif;
    font-size: 26px;
    font-weight: 500;
    line-height: 1.3;
  }
  .entry .model {
    font-family: "JetBrains Mono", monospace;
    font-size: 12px;
    color: var(--ink-soft);
    padding-top: 4px;
    border-top: 1px solid var(--line);
  }
  .entry .desc {
    font-size: 13px;
    color: var(--ink-soft);
    flex-grow: 1;
  }
  .entry .actions {
    display: flex;
    gap: 16px;
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding-top: 12px;
    border-top: 1px solid var(--line);
  }
  .entry .actions a {
    border-bottom: 1px solid transparent;
    padding-bottom: 2px;
    transition: border-color 0.18s, color 0.18s;
  }
  .entry .actions a:hover { border-color: var(--accent); color: var(--accent); }
  .entry .actions a.primary { color: var(--accent); }

  .empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 80px 0;
    color: var(--muted);
    font-style: italic;
  }

  /* Footer */
  footer {
    border-top: 1px solid var(--line);
    padding: 32px 0 64px;
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }
  footer a { border-bottom: 1px solid var(--line); padding-bottom: 2px; }
  footer a:hover { color: var(--accent); border-color: var(--accent); }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="brand">oreore<span class="accent">·</span>bench</div>
    <p class="tagline">
      俺基準のベンチマーク。同じプロンプトを違うモデルに投げて、何が出てくるかを残す。
      指標は tokens/sec でも MMLU でもなく、「これは仕事で使えるか」の一点。
    </p>
    <div class="meta-row">
      <a href="https://github.com/noricha-vr/oreore-bench" target="_blank" rel="noopener">GitHub</a>
      <span id="stat-themes">— themes</span>
      <span id="stat-models">— models</span>
      <span id="stat-entries">— entries</span>
    </div>
  </header>

  <section class="filters" aria-label="Filters">
    <div class="filter-group">
      <div class="label">Theme</div>
      <div class="chips" id="theme-chips"></div>
    </div>
    <div class="filter-group">
      <div class="label">Model</div>
      <div class="chips" id="model-chips"></div>
    </div>
  </section>

  <div class="counter" id="counter">— showing</div>

  <main class="entries" id="entries"></main>

  <footer>
    <div>© 2026 noricha-vr · oreore-bench</div>
    <div>
      <a href="https://github.com/noricha-vr/oreore-bench#new-model" target="_blank" rel="noopener">Add a model →</a>
    </div>
  </footer>
</div>

<script>
  // === Data ===
  // 新しい作品を追加する時はここに entry を1つ追加するだけでよい。
  // PROMPT.md / index.html のパスはディレクトリ構造から自動で組み立てる。
  const THEMES = {
    "lp-nishibi": {
      title: "NISHIBI Landing Page",
      desc: "「西日で焼く日焼けサロン」というネタ前提を、寡黙でプレミアムな高級ブランド LP として真顔で表現できるか。コピー力 / 配色 / 情報設計 / 細部のジョーク密度を見る。"
    },
    "othello": {
      title: "Othello (Reversi)",
      desc: "HTML/CSS/JS 1 枚で動く 8x8 オセロ。盤面の状態管理、合法手判定、CPU AI のヒューリスティック、UI ハイライト、終局・パスの正しさ。"
    }
  };

  const ENTRIES = [
    {
      theme: "lp-nishibi",
      model: "gemma-4-31b",
      model_label: "Gemma 4 31B",
      provider: "Google (local via LM Studio)",
      runner: "gptme (non-interactive)",
      note: "ローカル LLM 単体での1ショット LP。418行/14KB。Cormorant Garamond + Noto Serif JP。"
    },
    {
      theme: "lp-nishibi",
      model: "claude-opus-4-8",
      model_label: "Claude Opus 4.8",
      provider: "Anthropic",
      runner: "Claude Code (Agent SDK / implementer)",
      note: "ローマ数字章番号、SVG 西日アーク、メタジョーク3つ、創設者名「中道 暁人」まで創出。1342行/40KB。"
    },
    {
      theme: "othello",
      model: "gemma-4-26b-a4b-qat",
      model_label: "Gemma 4 26B-A4B (QAT)",
      provider: "Google (local via LM Studio)",
      runner: "gptme (non-interactive)",
      note: "ライトテーマ。CPU AI はランダム黒に圧勝(53-10)。Reset が一度だけ不安定。"
    },
    {
      theme: "othello",
      model: "gemma-4-31b",
      model_label: "Gemma 4 31B",
      provider: "Google (local via LM Studio)",
      runner: "gptme (non-interactive)",
      note: "ダーク BG + 鮮緑盤 + 赤 Reset。CPU AI が強くランダム黒に勝利(34-30)。Reset 完璧。"
    }
  ];

  // === Render ===
  const state = { theme: "all", model: "all" };

  const countBy = (key, value) => ENTRIES.filter(e => value === "all" || e[key] === value).length;

  function renderChips(containerId, items, current, onChange) {
    const el = document.getElementById(containerId);
    el.innerHTML = "";
    items.forEach(it => {
      const chip = document.createElement("button");
      chip.className = "chip" + (it.key === current ? " active" : "");
      chip.innerHTML = `${it.label}<span class="count">${it.count}</span>`;
      chip.onclick = () => { onChange(it.key); };
      el.appendChild(chip);
    });
  }

  function renderFilters() {
    const themeKeys = Object.keys(THEMES);
    const modelKeys = [...new Set(ENTRIES.map(e => e.model))];

    const themeItems = [
      { key: "all", label: "All", count: ENTRIES.length },
      ...themeKeys.map(k => ({
        key: k,
        label: THEMES[k].title.split(" ")[0],
        count: countBy("theme", k)
      }))
    ];
    const modelItems = [
      { key: "all", label: "All", count: ENTRIES.length },
      ...modelKeys.map(k => ({
        key: k,
        label: ENTRIES.find(e => e.model === k).model_label,
        count: countBy("model", k)
      }))
    ];

    renderChips("theme-chips", themeItems, state.theme, k => { state.theme = k; renderAll(); });
    renderChips("model-chips", modelItems, state.model, k => { state.model = k; renderAll(); });

    document.getElementById("stat-themes").textContent = `${themeKeys.length} themes`;
    document.getElementById("stat-models").textContent = `${modelKeys.length} models`;
    document.getElementById("stat-entries").textContent = `${ENTRIES.length} entries`;
  }

  function renderEntries() {
    const filtered = ENTRIES.filter(e =>
      (state.theme === "all" || e.theme === state.theme) &&
      (state.model === "all" || e.model === state.model)
    );

    document.getElementById("counter").textContent =
      `Showing ${filtered.length} of ${ENTRIES.length}`;

    const el = document.getElementById("entries");
    el.innerHTML = "";

    if (filtered.length === 0) {
      el.innerHTML = `<div class="empty">No entries match this combination — try widening the filter.</div>`;
      return;
    }

    filtered.forEach(e => {
      const theme = THEMES[e.theme];
      const liveUrl = `./${e.theme}/${e.model}/index.html`;
      const promptUrl = `./${e.theme}/PROMPT.md`;
      const ghUrl = `https://github.com/noricha-vr/oreore-bench/tree/main/public/${e.theme}/${e.model}`;

      const card = document.createElement("article");
      card.className = "entry";
      card.innerHTML = `
        <div class="topline">
          <span class="theme">${e.theme}</span>
          <span>${e.runner}</span>
        </div>
        <h2 class="title">${theme.title}</h2>
        <div class="model">${e.model_label}<br><span style="opacity:.6">${e.provider}</span></div>
        <p class="desc">${e.note}</p>
        <div class="actions">
          <a href="${liveUrl}" class="primary" target="_blank">View →</a>
          <a href="${promptUrl}" target="_blank">Prompt</a>
          <a href="${ghUrl}" target="_blank">Source</a>
        </div>
      `;
      el.appendChild(card);
    });
  }

  function renderAll() { renderFilters(); renderEntries(); }
  renderAll();
</script>

</body>
</html>
