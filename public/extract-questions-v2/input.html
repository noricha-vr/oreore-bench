<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>extract-questions-v2 入力本文 — OreOre-Bench</title>
<link rel="stylesheet" href="/assets/apple-jobs.css">
<style>
  body {
    --theme-accent: #7C3AED;
    --theme-accent-dark: #5B21B6;
  }
</style>
</head>
<body class="document-page input-page">

<header class="hero">
  <div class="hero-inner">
    <a href="../" class="back">← OreOre-Bench に戻る</a>
    <h1>入力本文</h1>
    <p class="sub">extract-questions-v2 テーマで各モデルに渡している共通入力（AI アシスタントの出力例）。</p>
  </div>
</header>

<main class="container">
  <article class="card">
    <div class="stat-line">
      想定シナリオ: <strong>AI アシスタントがアプリ設計のヒアリングを行った出力</strong>
      ・ 約 <strong id="charcount">…</strong> 文字
      ・ 想定質問数 <strong>40 件</strong>
    </div>
    <pre class="body-text" id="body"></pre>
    <div class="meta">
      <a href="./input.md" target="_blank">input.md（元データ）</a>
      <a href="./prompt.html">プロンプトに戻る</a>
    </div>
  </article>
</main>

<script>
  fetch('./input.md').then(r => r.text()).then(text => {
    document.getElementById('body').textContent = text;
    document.getElementById('charcount').textContent = text.length.toLocaleString();
  }).catch(() => {
    document.getElementById('body').textContent = 'input.md を読み込めませんでした。';
  });
</script>

</body>
</html>
