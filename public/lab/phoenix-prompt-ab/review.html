<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>実験レビュー — OreOre-Bench Lab</title>
    <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%230071e3'/><text x='16' y='22' text-anchor='middle' font-family='sans-serif' font-size='18' font-weight='600' fill='white'>O</text></svg>">
    <link rel="stylesheet" href="/assets/apple-modern.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
    <link rel="stylesheet" href="../lab.css">
</head>
<body>
    <header class="nav">
        <div class="container header-inner">
            <a href="../../" class="brand-link">OreOre-Bench</a>
            <nav class="header-nav" aria-label="実験レビュー ナビゲーション">
                <a href="../" class="nav-link"><i class="fa-solid fa-arrow-left" aria-hidden="true"></i> Lab 一覧</a>
                <a href="../../" class="nav-link">ベンチ一覧</a>
                <a href="https://github.com/noricha-vr/oreore-bench" target="_blank" rel="noopener noreferrer" class="nav-link">GitHub</a>
            </nav>
        </div>
    </header>

    <main>
        <section>
            <div class="container">
                <div id="loading" class="empty-state">
                    <p><i class="fa-solid fa-spinner fa-spin" aria-hidden="true"></i></p>
                    <p>実験データを読み込んでいます...</p>
                </div>
                <div id="error" class="empty-state" style="display:none;">
                    <p><i class="fa-solid fa-triangle-exclamation" aria-hidden="true"></i></p>
                    <p id="error-msg">experiment.json を読み込めませんでした。</p>
                </div>
                <div id="content" style="display:none;">
                    <!-- ヘッダー / ラウンドを JS で描画 -->
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container footer-inner">
            <div>&copy; 2026 OreOre-Bench</div>
            <div>
                <a href="https://github.com/noricha-vr/oreore-bench" target="_blank" rel="noopener noreferrer" class="nav-link">GitHub</a>
            </div>
        </div>
    </footer>

    <script>
        // HTML エスケープ (experiment.json 由来の値を innerHTML に入れる前に必ず通す)
        function escapeHtml(s) {
            if (s === null || s === undefined) return '';
            return String(s)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        // 数値フォーマット (bytes: 1.2 KB / 3.4 MB)
        function formatBytes(n) {
            if (typeof n !== 'number' || !isFinite(n) || n < 0) return '-';
            if (n < 1024) return `${n} B`;
            if (n < 1024 * 1024) return `${(n / 1024).toFixed(1)} KB`;
            return `${(n / 1024 / 1024).toFixed(2)} MB`;
        }

        // A/B カラムを描画。variant: 'a' | 'b', isWinner: bool
        function renderColumn(round, variant, isWinner) {
            const v = round[variant];
            if (!v || typeof v !== 'object') return '';
            const id = escapeHtml(v.id || '');
            const label = escapeHtml(v.label || (variant.toUpperCase()));
            const errorCount = typeof v.errorCount === 'number' ? v.errorCount : null;
            const bytes = typeof v.bytes === 'number' ? v.bytes : null;

            // shots/{id}/scene1.png 〜 scene6.png
            const shotsHtml = [1, 2, 3, 4, 5, 6].map(i => {
                const src = `./shots/${encodeURIComponent(v.id)}/scene${i}.png`;
                return `
                    <a class="shot-thumb" href="${src}" target="_blank" rel="noopener noreferrer" aria-label="${label} scene${i}">
                        <img src="${src}" alt="${label} scene${i}"
                             onerror="this.style.display='none'; this.parentElement.innerHTML='<span class=&quot;shot-placeholder&quot;>scene${i}<br>(未撮影)</span>';">
                    </a>
                `;
            }).join('');

            // errorCount 表示クラス (0 は緑・それ以外は赤)
            let errorMetricHtml = '';
            if (errorCount !== null) {
                const cls = errorCount === 0 ? 'error-zero' : 'error-nonzero';
                errorMetricHtml = `<span class="ab-metric ${cls}"><i class="fa-solid fa-circle-exclamation" aria-hidden="true"></i> エラー <strong>${errorCount}</strong></span>`;
            }
            const bytesMetricHtml = bytes !== null
                ? `<span class="ab-metric"><i class="fa-solid fa-file-code" aria-hidden="true"></i> サイズ <strong>${escapeHtml(formatBytes(bytes))}</strong></span>`
                : '';

            const variantTagClass = variant === 'a' ? 'tag-a' : 'tag-b';
            const winnerTagHtml = isWinner
                ? '<span class="ab-tag winner-tag"><i class="fa-solid fa-crown" aria-hidden="true"></i> 勝者</span>'
                : '';

            // iframe 遅延ロード: 開いた瞬間に src を注入する
            const iframeId = `iframe-${id}`;
            const wrapId = `wrap-${id}`;
            const versionUrl = `./versions/${encodeURIComponent(v.id)}/index.html`;
            const promptUrl = `./prompts/${encodeURIComponent(v.id)}.md`;

            return `
                <div class="ab-col ${isWinner ? 'winner' : ''}">
                    <div class="ab-col-head">
                        <div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
                            <span class="ab-tag ${variantTagClass}">${variant.toUpperCase()}</span>
                            ${winnerTagHtml}
                        </div>
                    </div>
                    <h4 class="ab-label">${label}</h4>
                    <div class="ab-metrics">
                        ${errorMetricHtml}
                        ${bytesMetricHtml}
                    </div>
                    <div class="shot-scroller">${shotsHtml}</div>
                    <div class="ab-actions">
                        <a class="ab-btn primary" href="${versionUrl}" target="_blank" rel="noopener noreferrer">
                            <i class="fa-solid fa-arrow-up-right-from-square" aria-hidden="true"></i> 実物を開く
                        </a>
                        <button type="button" class="ab-btn" data-toggle-iframe="${wrapId}" data-iframe-src="${versionUrl}" data-iframe-id="${iframeId}">
                            <i class="fa-solid fa-window-maximize" aria-hidden="true"></i> ここで開く
                        </button>
                        <a class="ab-btn" href="${promptUrl}" target="_blank" rel="noopener noreferrer">
                            <i class="fa-solid fa-file-lines" aria-hidden="true"></i> プロンプト
                        </a>
                    </div>
                    <div class="iframe-wrap" id="${wrapId}">
                        <iframe id="${iframeId}" title="${label} プレビュー" loading="lazy" sandbox="allow-scripts allow-same-origin"></iframe>
                    </div>
                </div>
            `;
        }

        function renderRound(round, idx) {
            const num = typeof round.round === 'number' ? round.round : (idx + 1);
            const hypothesis = escapeHtml(round.hypothesis || '');
            const judgment = escapeHtml(round.judgment || '');
            const winner = round.winner === 'a' || round.winner === 'b' ? round.winner : null;

            const aHtml = renderColumn(round, 'a', winner === 'a');
            const bHtml = renderColumn(round, 'b', winner === 'b');

            return `
                <div class="round">
                    <div class="round-head">
                        <span class="round-num">Round ${escapeHtml(String(num))}</span>
                    </div>
                    ${hypothesis ? `<p class="round-hypothesis">${hypothesis}</p>` : ''}
                    ${judgment ? `<p class="round-judgment">${judgment}</p>` : ''}
                    <div class="ab-grid">
                        ${aHtml}
                        ${bHtml}
                    </div>
                </div>
            `;
        }

        function renderExperiment(exp) {
            const content = document.getElementById('content');

            const title = escapeHtml(exp.title || 'Experiment');
            const date = escapeHtml(exp.date || '');
            const model = escapeHtml(exp.model || '');
            const purpose = escapeHtml(exp.purpose || '');
            const constraints = escapeHtml(exp.constraints || '');
            const conclusion = exp.conclusion ? escapeHtml(exp.conclusion) : null;
            const finalPromptPath = exp.finalPromptPath ? escapeHtml(exp.finalPromptPath) : null;
            const rounds = Array.isArray(exp.rounds) ? exp.rounds : [];

            // タイトルを document.title にも反映
            if (exp.title) document.title = `${exp.title} — OreOre-Bench Lab`;

            const metaRows = [];
            if (date) metaRows.push(`<dt>日付</dt><dd>${date}</dd>`);
            if (model) metaRows.push(`<dt>モデル</dt><dd>${model}</dd>`);
            if (purpose) metaRows.push(`<dt>目的</dt><dd>${purpose}</dd>`);
            if (constraints) metaRows.push(`<dt>制約</dt><dd>${constraints}</dd>`);

            const conclusionHtml = conclusion
                ? `<div class="exp-conclusion"><strong>結論:</strong> ${conclusion}</div>`
                : `<div class="exp-conclusion pending"><strong>実験進行中</strong>: 最終結論はまだ確定していません。</div>`;

            const linksHtml = finalPromptPath
                ? `<div class="exp-links">
                    <a class="exp-link" href="./${finalPromptPath}" target="_blank" rel="noopener noreferrer">
                        <i class="fa-solid fa-file-lines" aria-hidden="true"></i> 最終プロンプトを開く
                    </a>
                   </div>`
                : '';

            const roundsHtml = rounds.length > 0
                ? rounds.map((r, i) => renderRound(r, i)).join('')
                : '<div class="empty-state"><p>ラウンドデータがありません。</p></div>';

            content.innerHTML = `
                <div class="exp-header">
                    <div class="exp-title-row">
                        <h1 class="exp-title">${title}</h1>
                    </div>
                    ${metaRows.length ? `<dl class="exp-meta-grid">${metaRows.join('')}</dl>` : ''}
                    ${conclusionHtml}
                    ${linksHtml}
                </div>
                <div class="rounds">${roundsHtml}</div>
            `;

            document.getElementById('loading').style.display = 'none';
            content.style.display = 'block';

            // iframe 遅延ロード: 「ここで開く」を初回クリックした瞬間だけ src を注入する
            content.querySelectorAll('[data-toggle-iframe]').forEach(btn => {
                btn.addEventListener('click', () => {
                    const wrapId = btn.getAttribute('data-toggle-iframe');
                    const iframeId = btn.getAttribute('data-iframe-id');
                    const src = btn.getAttribute('data-iframe-src');
                    const wrap = document.getElementById(wrapId);
                    const iframe = document.getElementById(iframeId);
                    if (!wrap || !iframe) return;
                    if (wrap.classList.contains('open')) {
                        wrap.classList.remove('open');
                        btn.innerHTML = '<i class="fa-solid fa-window-maximize" aria-hidden="true"></i> ここで開く';
                    } else {
                        // 初回のみ src を注入 (以降はキャッシュされたまま再表示)
                        if (!iframe.getAttribute('src')) iframe.setAttribute('src', src);
                        wrap.classList.add('open');
                        btn.innerHTML = '<i class="fa-solid fa-window-minimize" aria-hidden="true"></i> 閉じる';
                    }
                });
            });
        }

        function showError(msg) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('content').style.display = 'none';
            const err = document.getElementById('error');
            document.getElementById('error-msg').textContent = msg;
            err.style.display = 'block';
        }

        // experiment.json 取得。失敗 (404 / 壊れた JSON / file://) はエラー表示。
        fetch('./experiment.json', { cache: 'no-cache' })
            .then(r => r.ok ? r.json() : Promise.reject(new Error(`HTTP ${r.status}`)))
            .then(data => {
                if (!data || typeof data !== 'object' || Array.isArray(data)) {
                    throw new Error('experiment.json shape invalid');
                }
                renderExperiment(data);
            })
            .catch(err => {
                console.error('[experiment.json] load failed:', err.message);
                showError(`experiment.json を読み込めませんでした: ${err.message}`);
            });
    </script>
</body>
</html>
