<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HIBANA | 焔</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Shippori+Mincho:wght@400;600&family=Zen+Kaku+Gothic+New:wght@300&display=swap" rel="stylesheet">
    <style>
        :root {
            --dawn-bg: #f2ecf5;
            --dawn-wing: #b9a6e0;
            --orb: #e8f0a8;
            --flame: #ff7a2f;
            --ember: #ffb36b;
            --night: #0a1030;
            --feather: #7fb8ff;
            --sunset: #c23a1f;
            --ink: #2a2438;
            --transition-slow: all 1.5s cubic-bezier(0.2, 1, 0.3, 1);
            --transition-fast: all 0.6s cubic-bezier(0.2, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--night);
            color: white;
            font-family: 'Shippori Mincho', serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* --- Layout --- */
        .scroll-container {
            height: 900vh; /* 6 scenes * 150vh */
            position: relative;
        }

        .viewport {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
        }

        canvas#particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* --- UI --- */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 40px 60px;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.5rem;
            letter-spacing: 0.3em;
            font-weight: 500;
            color: white;
        }

        .logo-icon {
            width: 24px;
            height: 24px;
            background: #4a90e2;
            border-radius: 50%;
            filter: blur(1px);
            box-shadow: 0 0 10px #4a90e2;
        }

        .date-sub {
            font-family: 'Zen Kaku Gothic New', sans-serif;
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            opacity: 0.6;
        }

        nav {
            display: flex;
            gap: 30px;
            font-family: 'Zen Kaku Gothic New', sans-serif;
            font-size: 0.75rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        .progress-bar {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 1px;
            background: rgba(255,255,255,0.2);
            z-index: 100;
        }

        .progress-fill {
            height: 100%;
            background: white;
            width: 0%;
            transition: width 0.1s linear;
        }

        .sound-ring {
            position: fixed;
            bottom: 40px;
            left: 40px;
            width: 60px;
            height: 60px;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            z-index: 100;
            opacity: 0;
            transition: opacity 1s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        /* --- Scene Styling --- */
        .scene {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0 10%;
            opacity: 0;
            visibility: hidden;
            transition: opacity 1.2s ease, visibility 1.2s;
            z-index: 2;
        }

        .scene.active {
            opacity: 1;
            visibility: visible;
        }

        .scene-content {
            max-width: 800px;
            width: 100%;
            text-align: center;
        }

        /* Typography */
        .poem {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: clamp(1.4rem, 3.2vw, 2.6rem);
            line-height: 1.6;
            letter-spacing: 0.04em;
        }

        .staggered {
            display: block;
        }

        .staggered span {
            display: inline-block;
            margin-right: 0.3em;
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s cubic-bezier(0.2, 1, 0.3, 1);
        }

        .staggered span.show {
            opacity: 1;
            transform: translateY(0);
        }

        .jp-vertical {
            writing-mode: vertical-rl;
            font-family: 'Shippori Mincho', serif;
            font-size: 0.9rem;
            margin: 20px;
            opacity: 0.7;
            letter-spacing: 0.2em;
        }

        /* Scene Specifics */
        .s1-bg { background: radial-gradient(circle at 20% 30%, var(--dawn-bg), var(--night)); }
        .s1-orb {
            position: absolute;
            top: 15%;
            right: 20%;
            width: 100px;
            height: 100px;
            background: var(--orb);
            filter: blur(40px);
            border-radius: 50%;
            animation: float 6s infinite ease-in-out;
        }

        .s2-text {
            font-size: 5rem;
            font-weight: 600;
            filter: blur(1px);
        }

        .s3-bg {
            background: radial-gradient(circle at center, #4a1a4a, var(--night));
        }
        .s3-halo {
            position: absolute;
            width: 80vw;
            height: 80vw;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 0 100px rgba(255,255,255,0.1), inset 0 0 100px rgba(255,255,255,0.1);
            animation: pulse 8s infinite;
        }

        .s4-bg { background: var(--night); }
        .s5-bg { background: var(--night); }
        .crystal-container {
            display: flex;
            gap: 40px;
            transform-style: preserve-3d;
        }
        .crystal {
            width: 80px;
            height: 80px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            backdrop-filter: blur(5px);
            transform: rotateY(45deg) rotateX(45deg);
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
            animation: rotate3d 10s infinite linear;
        }
        .s5-bg .crystal:nth-child(2) { animation-delay: -2s; }
        .s5-bg .crystal:nth-child(3) { animation-delay: -4s; }

        .s6-bg {
            background: linear-gradient(to bottom, #4a0e0e, #0a1030);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.1); opacity: 0.6; }
        }
        @keyframes rotate3d {
            0% { transform: rotateY(0deg) rotateX(45deg); }
            100% { transform: rotateY(360deg) rotateX(45deg); }
        }

        @media (prefers-reduced-motion: reduce) {
            .staggered span { transition: none; transform: none; opacity: 1; }
            .crystal { animation: none; }
            #particle-canvas { display: none; }
        }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <header>
        <div class="logo-area">
            <div class="logo">HIBANA</div>
            <div class="logo-icon"></div>
            <div class="date-sub">Sept. 29</div>
        </div>
        <nav>
            <span>Works</span>
            <span>Philosophy</span>
            <span>Connect</span>
        </nav>
    </header>

    <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
    </div>

    <div class="sound-ring" id="soundRing"></div>

    <div class="scroll-container">
        <!-- Scene 1: Dawn -->
        <section class="scene s1-bg" id="scene1">
            <div class="s1-orb"></div>
            <div class="scene-content">
                <p class="poem">
                    <span class="staggered">what</span> <span class="staggered">guides</span> <span class="staggered">us</span>
                    <br>through <span class="staggered" style="color:var(--dawn-wing)">*change*</span>,
                    <br><span class="staggered">*reinvention*</span>, and the <span class="staggered">*unknown*</span>—</span>
                </p>
            </div>
        </section>

        <!-- Scene 2: Rise -->
        <section class="scene" id="scene2">
            <div class="scene-content">
                <h1 class="s2-text">再生である。</h1>
            </div>
        </section>

        <!-- Scene 3: Halo -->
        <section class="scene s3-bg" id="scene3">
            <div class="s3-halo"></div>
            <div class="scene-content">
                <h1 style="font-size: 12rem; font-weight: 500; letter-spacing: 1em;">音</h1>
            </div>
        </section>

        <!-- Scene 4: Feather -->
        <section class="scene s4-bg" id="scene4">
            <div class="scene-content" style="display: flex; align-items: center; justify-content: space-between; width: 90%;">
                <div class="jp-vertical">作品の断片。<br>光が描く軌跡。</div>
                <p class="poem" style="text-align: right;">
                    <span class="staggered">don't</span> <span class="staggered">just</span> <span class="staggered">*speak*</span> <span class="staggered">to</span> <span class="staggered">us.</span>
                    <br><span class="staggered">they</span> <span class="staggered">*stimulate*</span> <span class="staggered">us.</span>
                    <br><span class="staggered">light</span> <span class="staggered">*becomes*</span> <span class="staggered">私、flare.</span>
                </p>
            </div>
        </section>

        <!-- Scene 5: Crystal -->
        <section class="scene s5-bg" id="scene5">
            <div class="crystal-container">
                <div class="crystal"></div>
                <div class="crystal"></div>
                <div class="crystal"></div>
            </div>
        </section>

        <!-- Scene 6: Finale -->
        <section class="scene s6-bg" id="scene6">
            <div class="scene-content">
                <p class="poem" style="font-size: 2rem;">
                    <span class="staggered">*feel*</span> <span class="staggered">their</span> <span class="staggered">heat.</span>
                    <br><span class="staggered">焔と</span> <span class="staggered">*interact*</span> <span class="staggered">with.</span>
                </p>
            </div>
        </section>
    </div>

    <script>
        /**
         * HIBANA Engine
         */
        const config = {
            lerp: 0.08,
            scenes: 6,
            scrollHeight: 900,
            particleCount: 180
        };

        let currentScroll = 0;
        let targetScroll = 0;
        let currentSceneIndex = 0;

        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        const progressFill = document.getElementById('progressFill');
        const soundRing = document.getElementById('soundRing');
        const scenes = document.querySelectorAll('.scene');

        let particles = [];

        // Resize handler
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        /**
         * Particle System
         */
        class Particle {
            constructor(type) {
                this.type = type; // 'wing', 'flame', 'feather', 'orb'
                this.init();
            }

            init() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.size = Math.random() * 2 + 1;
                this.life = Math.random() * 100 + 100;
                this.opacity = Math.random() * 0.5 + 0.1;
                
                if (this.type === 'wing') {
                    this.color = '#b9a6e0';
                    this.vx *= 2;
                } else if (this.type === 'flame') {
                    this.color = '#ff7a2f';
                    this.vy = -Math.random() * 5 - 2;
                    this.size = Math.random() * 4 + 2;
                } else if (this.type === 'feather') {
                    this.color = '#7fb8ff';
                    this.vy = Math.random() * 3 + 1;
                    this.vx = (Math.random() - 0.5) * 1;
                } else {
                    this.color = '#e8f0a8';
                }
            }

            update(sceneIdx) {
                this.x += this.vx;
                this.y += this.vy;
                this.life--;

                // Boundary check & Reset
                if (this.life <= 0 || this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
                    this.init();
                }

                // Scene specific logic
                if (sceneIdx === 1 && this.type === 'wing') {
                    this.x += Math.sin(this.y * 0.01) * 2;
                }
                if (sceneIdx === 3 && this.type === 'orb') {
                    this.vx += (Math.random() - 0.5) * 0.1;
                }
                if (sceneIdx === 5) {
                    this.vx *= 0.95;
                    this.vy *= 0.95;
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.opacity;
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < config.particleCount; i++) {
                const types = ['wing', 'flame', 'feather', 'orb'];
                particles.push(new Particle(types[Math.floor(Math.random() * types.length)]));
            }
        }
        initParticles();

        /**
         * Animation Loop
         */
        function animate() {
            // Smooth scroll lerp
            currentScroll += (targetScroll - currentScroll) * config.lerp;
            
            const progress = currentScroll / config.scrollHeight;
            progressFill.style.width = `${(currentScroll / config.scrollHeight) * 100}%`;

            // Scene Index Calculation
            const sceneIdx = Math.min(Math.floor(currentScroll / (config.scrollHeight / config.scenes)), config.scenes - 1);
            
            // Update Scene Classes
            scenes.forEach((s, i) => {
                if (i === sceneIdx) {
                    s.classList.add('active');
                } else {
                    s.classList.remove('active');
                }
            });

            // Trigger Text Animation
            if (i === sceneIdx && i !== prevIdx) {
                const spans = s.querySelectorAll('.staggered span');
                spans.forEach((span, j) => {
                    setTimeout(() => {
                        span.classList.add('show');
                    }, j * 80);
                });
            }
            let prevIdx = sceneIdx;

            // Clear Canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Update & Draw Particles (only active logic for specific scenes)
            particles.forEach(p => {
                p.update(sceneIdx);
                p.draw();
            });

            requestAnimationFrame(animate);
        }

        /**
         * Listeners
         */
        window.addEventListener('scroll', () => {
            targetScroll = window.scrollY;
        });

        // Special interaction for sound ring
        soundRing.addEventListener('click', () => {
            soundRing.style.opacity = soundRing.style.opacity === '1' ? '0' : '1';
        });

        // Scene 4 trigger
        window.addEventListener('scroll', () => {
            const scrollPos = window.scrollY;
            if (scrollPos > (config.scrollHeight / config.scenes) * 3) {
                soundRing.style.opacity = '1';
            } else {
                soundRing.style.opacity = '0';
            }
        });

        // Start
        animate();
    </script>
</body>
</html>
