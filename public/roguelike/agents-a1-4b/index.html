<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Rogue Arena</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #eee;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        canvas {
            border: 2px solid #555;
            background-color: #000;
        }
        #hud {
            width: 800px;
            display: flex;
            justify-content: space-between;
            background-color: #222;
            padding: 10px;
            border: 1px solid #444;
            font-size: 16px;
        }
        #log {
            width: 800px;
            height: 100px;
            background-color: #222;
            border: 1px solid #444;
            overflow-y: scroll;
            padding: 5px;
            font-size: 14px;
            color: #aaa;
        }
        .log-entry { margin-bottom: 2px; }
        #menu-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 10;
        }
        #menu-title { font-size: 32px; color: gold; margin-bottom: 20px; text-align: center; }
        #menu-btn { padding: 10px 20px; font-size: 18px; cursor: pointer; background: #444; color: white; border: 1px solid #666; }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="800" height="500"></canvas>
    <div id="hud">
        <div>Floor: <span id="floor-disp">1</span> | Level: <span id="lvl-disp">1</span> / XP: <span id="xp-disp">0</span></div>
        <div>HP: <span id="hp-disp">100</span> / Max: <span id="max-hp-disp">100</span> | ATK: <span id="atk-disp">10</span></div>
        <div style="font-size: 12px; color: #888;">Inv: <span id="inv-disp">--</span></div>
    </div>
    <div id="log"></div>
</div>

<div id="menu-overlay">
    <h1 id="menu-title">ROGUE ARENA</h1>
    <button id="menu-btn" onclick="startGame()">Start Game</button>
</div>

        if (type === 'gold') div.style.color = '#ffcc00';
        div.textContent = `> ${msg}`;
        logEl.prepend(div);
        if (logEl.children.length > 20) logEl.lastChild.remove();
    }

    function render() {
        // Clear Canvas

        // Draw Map
        for(let y=0; y<ROWS; y++) {

                let tx = x * TILE_SIZE;
                let ty = y * TILE_SIZE;

                if(map[y][x] === 0) {
                    ctx.fillStyle = '#555'; // Floor
                    ctx.fillRect(tx, ty, TILE_SIZE, TILE_SIZE);
                } else if (map[y][x] === 1) {
                    ctx.fillStyle = '#333'; // Wall
                    ctx.fillRect(tx, ty, TILE_SIZE, TILE_SIZE);
                } else if (map[y][x] === 2) {
                    ctx.fillStyle = '#44aaff'; // Stairs (Blue)
                    ctx.fillRect(tx, ty, TILE_SIZE, TILE_SIZE);
                } else if (map[y][x] === 3) { // Exit
                    ctx.fillStyle = '#ff00ff';
                    ctx.fillRect(tx, ty, TILE_SIZE, TILE_SIZE);
                }

                // Draw Enemies
                enemies.forEach(e => {
                    if(e.x === x && e.y === y) {
                        ctx.fillStyle = '#ff0000'; // Red
                        ctx.fillRect(tx+2, ty+2, TILE_SIZE-4, TILE_SIZE-4);
                    }
                });

                // Draw Items
                items.forEach(i => {
                    if(i.x === x && i.y === y) {
                        if(i.type === 0) ctx.fillStyle = '#00ff00'; // Green Potion
                        else ctx.fillStyle = '#ffff00'; // Yellow Weapon
                        ctx.fillRect(tx+4, ty+4, TILE_SIZE-8, TILE_SIZE-8);
                    }
                });

                // Draw Player if visible
                if(player.x === x && player.y === y) {
                    ctx.fillStyle = '#ffffff'; // White Player
                    ctx.fillRect(tx+2, ty+2, TILE_SIZE-4, TILE_SIZE-4);
                }
            }
        }
