<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>墨流し — Suminagashi</title>
<style>
:root{
  --paper:#efeae0;
  --ink:#1a1a1f;
  --navy:#16407a;
  --verm:#c8372d;
  --pine:#2e6e52;
}
*{box-sizing:border-box}
html,body{
  width:100%;
  height:100%;
  margin:0;
  overflow:hidden;
  background:var(--paper);
  color:#27262a;
  font-family:"Yu Mincho","Hiragino Mincho ProN","Noto Serif JP",serif;
}
body{overscroll-behavior:none}
#fluid{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  display:block;
  touch-action:none;
  cursor:crosshair;
}
.ui{position:fixed;inset:0;pointer-events:none}
.title{
  position:absolute;
  left:30px;
  top:27px;
  writing-mode:vertical-rl;
  text-orientation:mixed;
  font-size:27px;
  letter-spacing:.16em;
  line-height:1;
  color:#27262a;
  opacity:.9;
}
.caption{
  position:absolute;
  left:19px;
  top:50%;
  transform:translateY(-50%) rotate(180deg);
  writing-mode:vertical-rl;
  font-family:Arial,sans-serif;
  font-size:9px;
  letter-spacing:.28em;
  font-weight:500;
  color:#77736c;
  white-space:nowrap;
}
.hint{
  position:absolute;
  left:50%;
  top:49%;
  transform:translate(-50%,-50%);
  white-space:nowrap;
  font-size:14px;
  letter-spacing:.48em;
  color:#77736c;
  opacity:.82;
  transition:opacity 1.4s ease,transform 1.4s ease;
}
.hint.hidden{
  opacity:0;
  transform:translate(-50%,-56%);
}
.dock{
  pointer-events:auto;
  position:absolute;
  left:50%;
  bottom:28px;
  transform:translateX(-50%);
  min-height:62px;
  display:flex;
  align-items:center;
  gap:13px;
  padding:10px 15px 10px 13px;
  border:1px solid rgba(100,94,83,.18);
  border-radius:22px;
  background:rgba(250,248,243,.67);
  box-shadow:0 8px 28px rgba(80,69,53,.08), inset 0 1px 0 rgba(255,255,255,.5);
  backdrop-filter:blur(14px) saturate(.82);
  -webkit-backdrop-filter:blur(14px) saturate(.82);
}
.palette{
  display:flex;
  align-items:center;
  gap:5px;
}
.swatch{
  appearance:none;
  border:0;
  background:none;
  width:38px;
  height:43px;
  padding:2px 1px 0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:space-between;
  color:#68645d;
  font-family:inherit;
  font-size:10px;
  cursor:pointer;
  opacity:.78;
}
.swatch:hover{opacity:1}
.swatch .dot{
  width:27px;
  height:27px;
  border-radius:50%;
  border:1px solid rgba(38,34,29,.1);
  box-shadow:0 1px 2px rgba(50,42,32,.1);
  transition:box-shadow .35s ease,transform .35s ease;
}
.swatch.selected .dot{
  box-shadow:0 0 0 2px rgba(250,248,243,.95),0 0 0 3px rgba(70,66,58,.7);
  transform:scale(.92);
}
.swatch .dot.cycle{
  background:conic-gradient(var(--ink) 0 25%,var(--navy) 25% 50%,var(--verm) 50% 75%,var(--pine) 75% 100%);
}
.swatch .dot.ink{background:var(--ink)}
.swatch .dot.navy{background:var(--navy)}
.swatch .dot.verm{background:var(--verm)}
.swatch .dot.pine{background:var(--pine)}
.divider{
  width:1px;
  height:27px;
  background:rgba(80,74,65,.2);
  margin:0 3px;
}
.control{
  appearance:none;
  border:0;
  background:none;
  font-family:inherit;
  color:#4c4943;
  cursor:pointer;
  padding:7px 5px;
}
.toggle{
  display:flex;
  align-items:center;
  gap:7px;
  font-size:11px;
  letter-spacing:.08em;
  white-space:nowrap;
}
.toggle .toggle-dot{
  width:8px;
  height:8px;
  border-radius:50%;
  background:#aaa59c;
  box-shadow:0 0 0 3px rgba(130,124,113,.08);
  transition:background .3s ease,box-shadow .3s ease;
}
.toggle.on .toggle-dot{
  background:var(--pine);
  box-shadow:0 0 0 3px rgba(46,110,82,.13);
}
.wash{
  font-size:11px;
  letter-spacing:.1em;
  white-space:nowrap;
  border:1px solid rgba(90,84,75,.18);
  border-radius:14px;
  padding:8px 11px;
  transition:background .3s ease,border-color .3s ease;
}
.wash:hover{background:rgba(255,255,255,.4);border-color:rgba(90,84,75,.35)}
.credit{
  position:absolute;
  right:24px;
  bottom:18px;
  font-family:Arial,sans-serif;
  font-size:8px;
  letter-spacing:.18em;
  color:#8c877e;
  white-space:nowrap;
}
@media(max-width:620px){
  .title{left:20px;top:21px;font-size:23px}
  .caption{left:10px;font-size:8px}
  .hint{font-size:12px;letter-spacing:.29em}
  .dock{bottom:16px;gap:6px;padding:8px 9px;border-radius:19px}
  .swatch{width:31px;height:39px;font-size:9px}
  .swatch .dot{width:24px;height:24px}
  .divider{margin:0 1px}
  .toggle{font-size:10px;gap:5px}
  .wash{font-size:10px;padding:7px 8px}
  .credit{right:13px;bottom:8px;font-size:7px}
}
@media(prefers-reduced-motion:reduce){
  .hint,.swatch .dot,.toggle .toggle-dot{transition:none}
}
</style>
</head>
<body>
<canvas id="fluid"></canvas>

<div class="ui">
  <div class="title">墨流し</div>
  <div class="caption">SUMINAGASHI — INK DISSOLUTION</div>
  <div class="hint" id="hint">画 面 を な ぞ っ て 墨 を 流 す</div>

  <div class="dock">
    <div class="palette">
      <button class="swatch selected" data-color="cycle" aria-label="色を巡回">
        <span class="dot cycle"></span><span>巡</span>
      </button>
      <button class="swatch" data-color="ink" aria-label="墨">
        <span class="dot ink"></span><span>墨</span>
      </button>
      <button class="swatch" data-color="navy" aria-label="藍">
        <span class="dot navy"></span><span>藍</span>
      </button>
      <button class="swatch" data-color="verm" aria-label="朱">
        <span class="dot verm"></span><span>朱</span>
      </button>
      <button class="swatch" data-color="pine" aria-label="松葉">
        <span class="dot pine"></span><span>松葉</span>
      </button>
    </div>
    <span class="divider"></span>
    <button class="control toggle" id="auto" aria-pressed="false">
      <span class="toggle-dot"></span><span>自動演出</span>
    </button>
    <button class="control wash" id="wash">洗い流す</button>
  </div>
  <div class="credit">THREE.JS · STABLE FLUIDS</div>
</div>

<script>
(() => {
  "use strict";

  const canvas = document.getElementById("fluid");
  const gl = canvas.getContext("webgl2", {
    alpha:false,
    antialias:false,
    premultipliedAlpha:false,
    preserveDrawingBuffer:false
  });

  if (!gl) {
    document.body.innerHTML = '<div style="padding:2em;font-family:serif">WebGL2 が必要です。</div>';
    return;
  }

  const reduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  const floatExtension = gl.getExtension("EXT_color_buffer_float");
  const floatInternal = !!floatExtension;
  const internalFormat = floatInternal ? gl.RGBA16F : gl.RGBA8;
  const textureType = floatInternal ? gl.HALF_FLOAT : gl.UNSIGNED_BYTE;

  const vertex = `#version 300 es
  precision highp float;
  out vec2 vUv;
  void main(){
    vec2 p;
    if(gl_VertexID==0) p=vec2(-1.0,-1.0);
    else if(gl_VertexID==1) p=vec2(3.0,-1.0);
    else p=vec2(-1.0,3.0);
    vUv=p*.5+.5;
    gl_Position=vec4(p,0.0,1.0);
  }`;

  const fsAdvectVelocity = `#version 300 es
  precision highp float;
  in vec2 vUv; out vec4 outColor;
  uniform sampler2D uVelocity;
  uniform vec2 uTexel;
  uniform float uDt;
  uniform float uWash;
  void main(){
    vec2 velocity=texture(uVelocity,vUv).xy;
    vec2 coord=clamp(vUv-velocity*uDt,vec2(0.001),vec2(0.999));
    vec2 result=texture(uVelocity,coord).xy;
    result*=exp(-0.028*uDt);
    if(uWash>0.0) result+=vec2(0.0,-0.018)*uWash*uDt;
    outColor=vec4(result,0.0,1.0);
  }`;

  const fsSplatVelocity = `#version 300 es
  precision highp float;
  in vec2 vUv; out vec4 outColor;
  uniform sampler2D uVelocity;
  uniform vec2 uPoint;
  uniform vec2 uForce;
  uniform float uRadius;
  uniform float uAspect;
  void main(){
    vec2 d=(vUv-uPoint)*vec2(uAspect,1.0);
    float g=exp(-dot(d,d)/(uRadius*uRadius));
    vec2 v=texture(uVelocity,vUv).xy+uForce*g;
    outColor=vec4(v,0.0,1.0);
  }`;

  const fsCurl = `#version 300 es
  precision highp float;
  in vec2 vUv; out vec4 outColor;
  uniform sampler2D uVelocity;
  uniform vec2 uTexel;
  void main(){
    float l=texture(uVelocity,vUv-vec2(uTexel.x,0.0)).y;
    float r=texture(uVelocity,vUv+vec2(uTexel.x,0.0)).y;
    float b=texture(uVelocity,vUv-vec2(0.0,uTexel.y)).x;
    float t=texture(uVelocity,vUv+vec2(0.0,uTexel.y)).x;
    float c=(r-l)/(2.0*uTexel.x)-(t-b)/(2.0*uTexel.y);
    outColor=vec4(c,0.0,0.0,1.0);
  }`;

  const fsVorticity = `#version 300 es
  precision highp float;
  in vec2 vUv; out vec4 outColor;
  uniform sampler2D uVelocity;
  uniform sampler2D uCurl;
  uniform vec2 uTexel;
  uniform float uDt;
  uniform float uEpsilon;
  void main(){
    float c=texture(uCurl,vUv).r;
    float l=abs(texture(uCurl,vUv-vec2(uTexel.x,0.0)).r);
    float r=abs(texture(uCurl,vUv+vec2(uTexel.x,0.0)).r);
    float b=abs(texture(uCurl,vUv-vec2(0.0,uTexel.y)).r);
    float t=abs(texture(uCurl,vUv+vec2(0.0,uTexel.y)).r);
    vec2 n=normalize(vec2(r-l,t-b)+vec2(0.00001));
    vec2 force=vec2(n.y,-n.x)*c*uEpsilon;
    vec2 v=texture(uVelocity,vUv).xy+force*uDt;
    outColor=vec4(v,0.0,1.0);
  }`;

  const fsDivergence = `#version 300 es
  precision highp float;
  in vec2 vUv; out vec4 outColor;
  uniform sampler2D uVelocity;
  uniform vec2 uTexel;
  void main(){
    float l=texture(uVelocity,vUv-vec2(uTexel.x,0.0)).x;
    float r=texture(uVelocity,vUv+vec2(uTexel.x,0.0)).x;
    float b=texture(uVelocity,vUv-vec2(0.0,uTexel.y)).y;
    float t=texture(uVelocity,vUv+vec2(0.0,uTexel.y)).y;
    float d=0.5*((r-l)/uTexel.x+(t-b)/uTexel.y);
    outColor=vec4(d,0.0,0.0,1.0);
  }`;

  const fsPressure = `#version 300 es
  precision highp float;
  in vec2 vUv; out vec4 outColor;
  uniform sampler2D uPressure;
  uniform sampler2D uDivergence;
  uniform vec2 uTexel;
  void main(){
    float tx=1.0/(uTexel.x*uTexel.x);
    float ty=1.0/(uTexel.y*uTexel.y);
    float l=texture(uPressure,vUv-vec2(uTexel.x,0.0)).r;
    float r=texture(uPressure,vUv+vec2(uTexel.x,0.0)).r;
    float b=texture(uPressure,vUv-vec2(0.0,uTexel.y)).r;
    float t=texture(uPressure,vUv+vec2(0.0,uTexel.y)).r;
    float div=texture(uDivergence,vUv).r;
    float p=(tx*(l+r)+ty*(b+t)-div)/(2.0*(tx+ty));
    outColor=vec4(p,0.0,0.0,1.0);
  }`;

  const fsGradient = `#version 300 es
  precision highp float;
  in vec2 vUv; out vec4 outColor;
  uniform sampler2D uVelocity;
  uniform sampler2D uPressure;
  uniform vec2 uTexel;
  void main(){
    float l=texture(uPressure,vUv-vec2(uTexel.x,0.0)).r;
    float r=texture(uPressure,vUv+vec2(uTexel.x,0.0)).r;
    float b=texture(uPressure,vUv-vec2(0.0,uTexel.y)).r;
    float t=texture(uPressure,vUv+vec2(0.0,uTexel.y)).r;
    vec2 v=texture(uVelocity,vUv).xy-vec2((r-l)/(2.0*uTexel.x),(t-b)/(2.0*uTexel.y));
    outColor=vec4(v,0.0,1.0);
  }`;

  const fsAdvectDye = `#version 300 es
  precision highp float;
  in vec2 vUv; out vec4 outColor;
  uniform sampler2D uDye;
  uniform sampler2D uVelocity;
  uniform vec2 uTexel;
  uniform float uDt;
  uniform float uFade;
  void main(){
    vec2 v=texture(uVelocity,vUv).xy;
    vec2 coord=clamp(vUv-v*uDt,vec2(0.001),vec2(0.999));
    vec3 d=texture(uDye,coord).rgb*.96;
    d+=texture(uDye,clamp(coord+vec2(uTexel.x,0.0),vec2(0.001),vec2(.999))).rgb*.01;
    d+=texture(uDye,clamp(coord-vec2(uTexel.x,0.0),vec2(0.001),vec2(.999))).rgb*.01;
    d+=texture(uDye,clamp(coord+vec2(0.0,uTexel.y),vec2(0.001),vec2(.999))).rgb*.01;
    d+=texture(uDye,clamp(coord-vec2(0.0,uTexel.y),vec2(0.001),vec2(.999))).rgb*.01;
    outColor=vec4(max(d,vec3(0.0))*exp(-uFade*uDt),1.0);
  }`;

  const fsSplatDye = `#version 300 es
  precision highp float;
  in vec2 vUv; out vec4 outColor;
  uniform sampler2D uDye;
  uniform vec2 uPoint;
  uniform vec3 uInk;
  uniform float uAmount;
  uniform float uRadius;
  uniform float uAspect;
  void main(){
    vec2 d=(vUv-uPoint)*vec2(uAspect,1.0);
    float g=exp(-dot(d,d)/(uRadius*uRadius));
    vec3 dye=texture(uDye,vUv).rgb+uInk*g*uAmount;
    outColor=vec4(dye,1.0);
  }`;

  const fsRender = `#version 300 es
  precision highp float;
  in vec2 vUv; out vec4 outColor;
  uniform sampler2D uDye;
  float hash(vec2 p){
    p=fract(p*vec2(123.34,456.21));
    p+=dot(p,p+45.32);
    return fract(p.x*p.y);
  }
  void main(){
    vec3 base=vec3(239.0,234.0,224.0)/255.0;
    float fine=hash(floor(vUv*vec2(720.0,840.0)))-.5;
    float fiber=sin(vUv.x*920.0+sin(vUv.y*7.0))*0.0013;
    vec3 paper=base*(1.0+fine*.005+fiber);
    vec3 absorption=max(texture(uDye,vUv).rgb,vec3(0.0));
    vec3 color=paper*exp(-absorption);
    outColor=vec4(color,1.0);
  }`;

  function makeProgram(fragmentSource){
    const vs=gl.createShader(gl.VERTEX_SHADER);
    gl.shaderSource(vs,vertex);
    gl.compileShader(vs);
    if(!gl.getShaderParameter(vs,gl.COMPILE_STATUS)) throw new Error(gl.getShaderInfoLog(vs));
    const fs=gl.createShader(gl.FRAGMENT_SHADER);
    gl.shaderSource(fs,fragmentSource);
    gl.compileShader(fs);
    if(!gl.getShaderParameter(fs,gl.COMPILE_STATUS)) throw new Error(gl.getShaderInfoLog(fs));
    const p=gl.createProgram();
    gl.attachShader(p,vs);
    gl.attachShader(p,fs);
    gl.linkProgram(p);
    if(!gl.getProgramParameter(p,gl.LINK_STATUS)) throw new Error(gl.getProgramInfoLog(p));
    gl.deleteShader(vs);
    gl.deleteShader(fs);
    return p;
  }

  const programs={
    advectVelocity:makeProgram(fsAdvectVelocity),
    splatVelocity:makeProgram(fsSplatVelocity),
    curl:makeProgram(fsCurl),
    vorticity:makeProgram(fsVorticity),
    divergence:makeProgram(fsDivergence),
    pressure:makeProgram(fsPressure),
    gradient:makeProgram(fsGradient),
    advectDye:makeProgram(fsAdvectDye),
    splatDye:makeProgram(fsSplatDye),
    render:makeProgram(fsRender)
  };

  const vao=gl.createVertexArray();
  gl.bindVertexArray(vao);

  let simW=1,simH=1,aspect=1,texel=[1,1];
  let velocity,dye,pressure,divergence,curl;

  function texture(){
    const t=gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D,t);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
    gl.texImage2D(gl.TEXTURE_2D,0,internalFormat,simW,simH,0,gl.RGBA,textureType,null);
    return t;
  }

  function target(){
    const t=texture();
    const f=gl.createFramebuffer();
    gl.bindFramebuffer(gl.FRAMEBUFFER,f);
    gl.framebufferTexture2D(gl.FRAMEBUFFER,gl.COLOR_ATTACHMENT0,gl.TEXTURE_2D,t,0);
    if(gl.checkFramebufferStatus(gl.FRAMEBUFFER)!==gl.FRAMEBUFFER_COMPLETE){
      throw new Error("Framebuffer incomplete");
    }
    return {tex:t,fb:f};
  }

  function pair(){
    return {a:target(),b:target()};
  }

  function swap(p){
    const t=p.a;p.a=p.b;p.b=t;
  }

  function clearTarget(t){
    gl.bindFramebuffer(gl.FRAMEBUFFER,t.fb);
    gl.viewport(0,0,simW,simH);
    gl.clearColor(0,0,0,0);
    gl.clear(gl.COLOR_BUFFER_BIT);
  }

  function resize(){
    const dpr=Math.min(window.devicePixelRatio||1,2);
    const w=Math.max(1,Math.floor(innerWidth*dpr));
    const h=Math.max(1,Math.floor(innerHeight*dpr));
    if(canvas.width===w && canvas.height===h && velocity) return;
    canvas.width=w;canvas.height=h;
    const longest=Math.max(w,h);
    const scale=Math.min(1,700/longest);
    simW=Math.max(160,Math.floor(w*scale));
    simH=Math.max(160,Math.floor(h*scale));
    aspect=simW/simH;
    texel=[1/simW,1/simH];
    velocity=pair();
    dye=pair();
    pressure=pair();
    divergence=target();
    curl=target();
    clearTarget(velocity.a);clearTarget(velocity.b);
    clearTarget(dye.a);clearTarget(dye.b);
    clearTarget(pressure.a);clearTarget(pressure.b);
    clearTarget(divergence);clearTarget(curl);
  }
  window.addEventListener("resize",resize,{passive:true});
  resize();

  function bindTexture(program,name,t,unit){
    gl.activeTexture(gl.TEXTURE0+unit);
    gl.bindTexture(gl.TEXTURE_2D,t.tex||t);
    gl.uniform1i(gl.getUniformLocation(program,name),unit);
  }

  function draw(target,program,setup){
    gl.bindFramebuffer(gl.FRAMEBUFFER,target?target.fb:null);
    gl.viewport(0,0,target?simW:canvas.width,target?simH:canvas.height);
    gl.useProgram(program);
    setup(program);
    gl.drawArrays(gl.TRIANGLES,0,3);
  }

  const base=[239/255,234/255,224/255];
  const pigments={
    ink:[26/255,26/255,31/255],
    navy:[22/255,64/255,122/255],
    verm:[200/255,55/255,45/255],
    pine:[46/255,110/255,82/255]
  };
  const absorption={};
  Object.keys(pigments).forEach(k=>{
    absorption[k]=pigments[k].map((v,i)=>Math.max(0,Math.log(base[i]/Math.max(v,.015))*.92));
  });

  function set2(p,n,a,b){gl.uniform2f(gl.getUniformLocation(p,n),a,b)}
  function set1(p,n,v){gl.uniform1f(gl.getUniformLocation(p,n),v)}
  function set3(p,n,v){gl.uniform3f(gl.getUniformLocation(p,n),v[0],v[1],v[2])}

  const input={
    x:.5,y:.5,has:false,down:false,
    kick:[0,0],lastX:0,lastY:0,lastTime:0
  };
  let selected="cycle";
  let auto=false;
  let washing=false;
  let washTimer=0;
  let autoTime=0;

  function pointFromEvent(e){
    const r=canvas.getBoundingClientRect();
    return {
      x:Math.max(0,Math.min(1,(e.clientX-r.left)/r.width)),
      y:Math.max(0,Math.min(1,1-(e.clientY-r.top)/r.height))
    };
  }
  function firstGesture(){
    document.getElementById("hint").classList.add("hidden");
  }
  function movePointer(e){
    e.preventDefault();
    const p=pointFromEvent(e);
    const now=performance.now();
    if(input.has){
      const dt=Math.max(.008,(now-input.lastTime)/1000);
      const gain=input.down?.95:.32;
      input.kick[0]=Math.max(-.9,Math.min(.9,input.kick[0]+((p.x-input.lastX)/dt)*gain));
      input.kick[1]=Math.max(-.9,Math.min(.9,input.kick[1]+((p.y-input.lastY)/dt)*gain));
    }
    input.x=p.x;input.y=p.y;input.lastX=p.x;input.lastY=p.y;
    input.lastTime=now;input.has=true;
  }
  canvas.addEventListener("pointermove",movePointer,{passive:false});
  canvas.addEventListener("pointerdown",e=>{
    e.preventDefault();
    firstGesture();
    washing=false;washTimer=0;
    input.down=true;
    const p=pointFromEvent(e);
    input.x=p.x;input.y=p.y;input.lastX=p.x;input.lastY=p.y;
    input.lastTime=performance.now();input.has=true;
    try{canvas.setPointerCapture(e.pointerId)}catch(_){}
  },{passive:false});
  function endPointer(e){
    input.down=false;
    try{canvas.releasePointerCapture(e.pointerId)}catch(_){}
  }
  canvas.addEventListener("pointerup",endPointer,{passive:false});
  canvas.addEventListener("pointercancel",endPointer,{passive:false});
  canvas.addEventListener("pointerleave",()=>{if(!input.down){}},{passive:true});

  document.querySelectorAll(".swatch").forEach(button=>{
    button.addEventListener("click",()=>{
      selected=button.dataset.color;
      document.querySelectorAll(".swatch").forEach(b=>b.classList.toggle("selected",b===button));
    });
  });

  const autoButton=document.getElementById("auto");
  autoButton.addEventListener("click",()=>{
    auto=!auto;
    autoButton.classList.toggle("on",auto);
    autoButton.setAttribute("aria-pressed",String(auto));
  });

  document.getElementById("wash").addEventListener("click",()=>{
    washing=true;
    washTimer=0;
  });

  function activePigment(t){
    if(selected!=="cycle") return absorption[selected];
    const i=Math.floor(t/4)%4;
    return absorption[["ink","navy","verm","pine"][i]];
  }

  function simulate(dt){
    const eps=reduced?.28:.72;

    draw(velocity.b,programs.advectVelocity,p=>{
      bindTexture(p,"uVelocity",velocity.a,0);
      set2(p,"uTexel",texel[0],texel[1]);
      set1(p,"uDt",dt);
      set1(p,"uWash",washing?1:0);
    });
    swap(velocity);

    let force=input.kick.slice();
    input.kick[0]*=Math.exp(-dt*8.0);
    input.kick[1]*=Math.exp(-dt*8.0);

    let dyeAmount=input.down?dt*1.05:0;
    let dyePoint=[input.x,input.y];
    let dyeColor=activePigment(performance.now()/1000);

    if(auto && !reduced && !input.down && !washing){
      autoTime+=dt;
      const ax=.5+.25*Math.sin(autoTime*.31);
      const ay=.51+.24*Math.cos(autoTime*.23+1.2);
      dyePoint=[ax,ay];
      const pulse=Math.max(0,Math.sin(autoTime*.78)*.5+.5);
      dyeAmount+=dt*(.14+.22*pulse);
      force[0]+=Math.cos(autoTime*.73)*.025;
      force[1]+=Math.sin(autoTime*.61)*.025;
      dyeColor=activePigment(autoTime);
    } else if(auto && !reduced) {
      autoTime+=dt;
    }

    if(input.has && (Math.abs(force[0])>.0005||Math.abs(force[1])>.0005)){
      draw(velocity.b,programs.splatVelocity,p=>{
        bindTexture(p,"uVelocity",velocity.a,0);
        set2(p,"uPoint",input.x,input.y);
        set2(p,"uForce",force[0],force[1]);
        set1(p,"uRadius",.027);
        set1(p,"uAspect",aspect);
      });
      swap(velocity);
    }

    draw(curl,programs.curl,p=>{
      bindTexture(p,"uVelocity",velocity.a,0);
      set2(p,"uTexel",texel[0],texel[1]);
    });

    draw(velocity.b,programs.vorticity,p=>{
      bindTexture(p,"uVelocity",velocity.a,0);
      bindTexture(p,"uCurl",curl,1);
      set2(p,"uTexel",texel[0],texel[1]);
      set1(p,"uDt",dt);
      set1(p,"uEpsilon",eps);
    });
    swap(velocity);

    draw(divergence,programs.divergence,p=>{
      bindTexture(p,"uVelocity",velocity.a,0);
      set2(p,"uTexel",texel[0],texel[1]);
    });

    clearTarget(pressure.a);
    for(let i=0;i<11;i++){
      draw(pressure.b,programs.pressure,p=>{
        bindTexture(p,"uPressure",pressure.a,0);
        bindTexture(p,"uDivergence",divergence,1);
        set2(p,"uTexel",texel[0],texel[1]);
      });
      swap(pressure);
    }

    draw(velocity.b,programs.gradient,p=>{
      bindTexture(p,"uVelocity",velocity.a,0);
      bindTexture(p,"uPressure",pressure.a,1);
      set2(p,"uTexel",texel[0],texel[1]);
    });
    swap(velocity);

    draw(dye.b,programs.advectDye,p=>{
      bindTexture(p,"uDye",dye.a,0);
      bindTexture(p,"uVelocity",velocity.a,1);
      set2(p,"uTexel",texel[0],texel[1]);
      set1(p,"uDt",dt);
      set1(p,"uFade",washing?.48:.0018);
    });
    swap(dye);

    if(dyeAmount>0){
      draw(dye.b,programs.splatDye,p=>{
        bindTexture(p,"uDye",dye.a,0);
        set2(p,"uPoint",dyePoint[0],dyePoint[1]);
        set3(p,"uInk",dyeColor);
        set1(p,"uAmount",dyeAmount);
        set1(p,"uRadius",input.down?.022:.032);
        set1(p,"uAspect",aspect);
      });
      swap(dye);
    }

    if(washing){
      washTimer+=dt;
      if(washTimer>10){
        clearTarget(dye.a);clearTarget(dye.b);
        washing=false;
        washTimer=0;
      }
    }
  }

  function render(){
    draw(null,programs.render,p=>{
      bindTexture(p,"uDye",dye.a,0);
    });
  }

  let previous=performance.now();
  function frame(now){
    const dt=Math.min(.033,Math.max(.001,(now-previous)/1000));
    previous=now;
    simulate(dt);
    render();
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
