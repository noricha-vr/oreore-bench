<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pr-triage 入力本文 — OreOre-Bench</title>
<link rel="stylesheet" href="/assets/apple-jobs.css">
<style>
  body {
    --theme-accent: #475569;
    --theme-accent-dark: #1f2937;
  }
</style>
</head>
<body class="document-page input-page">

<header class="hero">
  <div class="hero-inner">
    <a href="../" class="back">← OreOre-Bench に戻る</a>
    <h1>入力本文</h1>
    <p class="sub">pr-triage テーマで各モデルに渡している共通入力（架空リポジトリの PR 一覧）。</p>
  </div>
</header>

<main class="container">
  <article class="card">
    <div class="stat-line">
      想定シナリオ: <strong>個人開発 SaaS の Open PR 10 件トリアージ</strong>
      ・ 約 <strong id="charcount">...</strong> 文字
      ・ 対象 PR <strong>10 件</strong>
    </div>
    <pre class="body-text" id="body"></pre>
    <div class="meta">
      <a href="./input.md" target="_blank">input.md（元データ）</a>
      <a href="./prompt.html">プロンプトに戻る</a>
    </div>
  </article>
</main>

<script>
  fetch('./input.md').then(r => r.text()).then(text => {
    document.getElementById('body').textContent = text;
    document.getElementById('charcount').textContent = text.length.toLocaleString();
  }).catch(() => {
    document.getElementById('body').textContent = 'input.md を読み込めませんでした。';
  });
</script>

</body>
</html>
