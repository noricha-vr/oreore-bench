# Cloudflare Pages デプロイ設定
#
# このファイルにより、wrangler コマンドにオプションを毎回渡さなくても
# デプロイ先プロジェクトが固定される。
#
# デプロイ:
#   wrangler pages deploy public/
#
# 設定参考: https://developers.cloudflare.com/pages/functions/wrangler-configuration/

name = "oreore-bench"
pages_build_output_dir = "public"
compatibility_date = "2026-06-30"
